  <script>
  // Load React + Babel with a backup CDN, and show an error instead of a grey screen.
  (function () {
    var SETS = [
      { react: "https://unpkg.com/react@18/umd/react.production.min.js",
        dom:   "https://unpkg.com/react-dom@18/umd/react-dom.production.min.js",
        babel: "https://unpkg.com/@babel/standalone/babel.min.js" },
      { react: "https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js",
        dom:   "https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js",
        babel: "https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js" }
    ];
    function loadScript(src) {
      return new Promise(function (res, rej) {
        var s = document.createElement("script");
        s.src = src; s.onload = res;
        s.onerror = function () { rej(new Error(src)); };
        document.head.appendChild(s);
      });
    }
    function loadSet(i) {
      var set = SETS[i];
      return loadScript(set.react)
        .then(function(){ return loadScript(set.dom); })
        .then(function(){ return loadScript(set.babel); });
    }
    function runBabel() {
      var msg = document.getElementById("loadmsg");
      if (msg) msg.style.display = "none";
      var tag = document.getElementById("game-source");
      var out = Babel.transform(tag.textContent, { presets: ["react"] }).code;
      var s = document.createElement("script");
      s.textContent = out;
      document.body.appendChild(s);
    }
    function fail() {
      document.getElementById("loadmsg").innerHTML =
        "⚠️ Couldn't load the game.<br>Check your internet connection and reload the page.";
    }
    loadSet(0).then(runBabel).catch(function () {
      loadSet(1).then(runBabel).catch(fail);
    });
  })();
  </script>

const FIRST_NAMES = ["Kai","Zak","Eli","Ryan","Ben","Leo","Theo","Max","Sam","Noah","Jude","Cole","Reece","Finn","Joel","Tariq","Diego","Mateo","Luca","Andre","Yusuf","Omar","Kofi","Jens","Nils","Pavel","Marco","Bruno","Rio","Kasper","Emre","Dani","Ravi","Hugo","Felix","Ivan","Saul"];

const POSITIONS = ["GK","CB","CB","LB","RB","CM","CM","LW","RW","ST","ST"];

function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function uid(){ return Date.now() + Math.floor(Math.random()*1000000); }

// Generate one scouted prospect. Every player has a HIDDEN potential ceiling — the gamble.
function genProspect(spec, division){
  const youthBias = spec === "Youth" || spec === "Local";
  const age = youthBias ? 16 + Math.floor(Math.random()*4)
                        : 19 + Math.floor(Math.random()*9);
  const base = 38 + division*6;
  let current = base + Math.floor(Math.random()*16) - 6;
  current = Math.max(40, Math.min(78, current));
  const roll = Math.random();
  let potBonus;
  if (roll < 0.55)      potBonus = 2 + Math.floor(Math.random()*6);
  else if (roll < 0.85) potBonus = 8 + Math.floor(Math.random()*8);
  else if (roll < 0.97) potBonus = 16 + Math.floor(Math.random()*12);
  else                  potBonus = 28 + Math.floor(Math.random()*14);
  const ageRoom = age <= 18 ? 6 : age <= 21 ? 3 : 0;
  const potential = Math.min(99, current + potBonus + ageRoom);
  const pos = rand(POSITIONS);
  const price = Math.round((current*current*1.4 + division*1500) * (0.8+Math.random()*0.5));
  const wage = Math.round(30 + current*2.5 + division*15);
  const gap = potential - current;
  const hint = gap >= 28 ? "⭐ Scouts are raving — could be generational"
             : gap >= 16 ? "🔥 High ceiling — real potential here"
             : gap >= 8  ? "📈 Room to grow"
             : "Looks like a steady squad option";
  return { name: `${rand(FIRST_NAMES)} ${rand(LAST_NAMES)}`, pos, age, rating: current, potential, wage, price, hint, scoutSpec: spec, id: uid() };
}

// Generate a full 18-player squad whose average sits near `str`.
// Wages scale with rating so a big club naturally has a big wage bill.
const SQUAD_TEMPLATE = ["GK","GK","CB","CB","CB","LB","RB","CM","CM","CM","LW","RW","LW","RW","ST","ST","CB","CM"];
function genSquad(str) {
  return SQUAD_TEMPLATE.map((pos, i) => {
    // Spread ratings around the club strength; starters a touch higher than bench
    const isStarter = i < 11;
    const spread = isStarter ? (Math.random()*8 - 2) : (Math.random()*10 - 8);
    let rating = Math.round(str + spread);
    rating = Math.max(35, Math.min(94, rating));
    const age = 18 + Math.floor(Math.random()*16);
    // Potential ceiling stays close to the club's level — only rare youngsters have big room.
    // Most players: small headroom. This stops weak-club players rocketing to 99.
    let potBonus;
    if (age <= 20) {
      const roll = Math.random();
      potBonus = roll < 0.75 ? 1 + Math.floor(Math.random()*5)    // 75% modest (+1–5)
               : roll < 0.95 ? 6 + Math.floor(Math.random()*6)    // 20% good (+6–11)
               : 12 + Math.floor(Math.random()*6);                // 5% gem (+12–17)
    } else if (age <= 24) {
      potBonus = Math.floor(Math.random()*4);                     // +0–3
    } else {
      potBonus = 0;                                               // peaked
    }
    const potential = Math.min(94, rating + potBonus);
    const wage = Math.round(40 + Math.pow(rating, 1.9) * 0.18);
    return { name: `${rand(FIRST_NAMES)} ${rand(LAST_NAMES)}`, pos, age, rating, potential, wage, id: uid() + i };
  });
}

// Build a league table of real club names (excluding the player's own club).
function buildLeagueFromClubs(clubs, myClubName) {
  return clubs.filter(c => c.name !== myClubName)
    .map(c => ({ name: c.name, str: c.str, played: 0, won: 0, drawn: 0, lost: 0, gd: 0, pts: 0 }));
}

// Deterministic RNG so a given club always shows the same squad.
function seededRng(seed) {
  let s = 0;
  for (let i = 0; i < seed.length; i++) s = (s * 31 + seed.charCodeAt(i)) >>> 0;
  return function () { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296; };
}

// Generate a rival club's squad consistently from its name + strength.
function genRivalSquad(clubName, str, season) {
  const rng = seededRng(clubName + "|" + season);
  const pick = arr => arr[Math.floor(rng() * arr.length)];
  return SQUAD_TEMPLATE.map((pos, i) => {
    const isStarter = i < 11;
    const spread = isStarter ? (rng()*8 - 2) : (rng()*10 - 8);
    let rating = Math.round(str + spread);
    rating = Math.max(35, Math.min(94, rating));
    const age = 18 + Math.floor(rng()*16);
    const potential = Math.min(94, rating + (age <= 20 ? Math.floor(rng()*8) : Math.floor(rng()*3)));
    const wage = Math.round(40 + Math.pow(rating, 1.9) * 0.18);
    return { name: `${pick(FIRST_NAMES)} ${pick(LAST_NAMES)}`, pos, age, rating, potential, wage, id: `${clubName}-${i}` };
  });
}

function fmt(n) {
  if (n >= 1000000) return `£${(n / 1000000).toFixed(1)}M`;
  if (n >= 1000) return `£${(n / 1000).toFixed(0)}K`;
  return `£${Math.round(n)}`;
}

function ord(n) {
  const s = ["th","st","nd","rd"], v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

// Market value: rises steeply with rating, boosted by youth + hidden potential.
// This is what makes "develop a gem then sell high" profitable.
function marketValue(p) {
  const r = p.rating;
  let base = Math.pow(r, 2.4) * 0.9;            // exponential — high rating = big money
  const pot = p.potential || r;
  const ageF = p.age <= 21 ? 1.6 : p.age <= 25 ? 1.3 : p.age <= 29 ? 1.0 : p.age <= 32 ? 0.6 : 0.3;
  const potF = 1 + Math.max(0, (pot - r)) * 0.03; // unrealised potential adds value
  return Math.round(base * ageF * potF);
}

function squadRating(players) {
  if (!players.length) return 0;
  return Math.round(players.reduce((a, p) => a + p.rating, 0) / players.length);
}

// Realistic goal sim: typical match ends 0-0 to 2-1
function simHalf(myStr, oppStr) {
  const dom = myStr / (myStr + oppStr);
  function goals(d) {
    const r = Math.random();
    if (r < 0.30) return 0;
    if (r < 0.62) return d > 0.45 ? 1 : 0;
    if (r < 0.85) return d > 0.40 ? 1 : 0;
    return d > 0.55 ? 2 : 1;
  }
  return { myGoals: goals(dom), oppGoals: goals(1 - dom) };
}

// Build minute-by-minute commentary for a half (the "watching it unfold" feel).
// startMin/endMin frame the half; scorers picked from your outfield players.
function buildCommentary(myGoals, oppGoals, players, clubName, oppName, startMin, endMin) {
  const attackers = players.filter(p => ["ST","LW","RW","CM"].includes(p.pos));
  const pickScorer = () => attackers.length ? rand(attackers).name : "the striker";
  const events = [];
  for (let i = 0; i < myGoals; i++) events.push({ mine: true });
  for (let i = 0; i < oppGoals; i++) events.push({ mine: false });
  // assign minutes
  events.forEach(e => { e.min = startMin + Math.floor(Math.random() * (endMin - startMin)); });
  events.sort((a, b) => a.min - b.min);
  const lines = events.map(e => e.mine
    ? { min: e.min, mine: true,  text: `⚽ GOAL! ${pickScorer()} scores for ${clubName}!` }
    : { min: e.min, mine: false, text: `💥 ${oppName} score.` });
  // a couple of flavour near-misses if quiet
  if (lines.length === 0) {
    const m = startMin + Math.floor(Math.random()*(endMin-startMin));
    lines.push({ min: m, mine: true, neutral: true, text: `${pickScorer()} fires just wide — tight half.` });
  }
  return lines;
}

// Random injury event — fires ~20% of matches
function maybeInjury(players, injuries) {
  if (Math.random() > 0.20) return injuries; // no injury
  const healthy = players.filter(p => !injuries.find(i => i.playerId === p.id));
  if (!healthy.length) return injuries;
  const victim = healthy[Math.floor(Math.random() * healthy.length)];
  const weeks = 2 + Math.floor(Math.random() * 5); // 2–6 weeks out
  return [...injuries, { playerId: victim.id, playerName: victim.name, weeksLeft: weeks }];
}

// Tick injuries down by 1 week, return updated list
function tickInjuries(injuries) {
  return injuries.map(i => ({ ...i, weeksLeft: i.weeksLeft - 1 })).filter(i => i.weeksLeft > 0);
}

// Effective squad rating accounting for injuries
function effectiveRating(players, injuries, mod, morale, staff) {
  const injuredIds = new Set(injuries.map(i => i.playerId));
  const available = players.filter(p => !injuredIds.has(p.id));
  if (!available.length) return 30;
  const base = Math.round(available.reduce((a, p) => a + p.rating, 0) / available.length);
  const moraleBonus = morale >= 75 ? 2 : morale <= 40 ? -3 : 0;
  const analystBonus = (staff || []).some(s => s.effect === "analyst") ? 2 : 0;
  return base + (mod || 0) + moraleBonus + analystBonus;
}

// Apply end-of-season player development: aging, staff bonuses, morale gains
function developPlayers(players, staff, morale, academyLevel) {
  const hasAtt  = staff.some(s => s.effect === "attackers");
  const hasDef  = staff.some(s => s.effect === "defenders");
  const hasGK   = staff.some(s => s.effect === "gk");
  const hasFit  = staff.some(s => s.effect === "fitness");
  const moraleBonus = morale >= 75 ? 1 : morale <= 40 ? -1 : 0;

  return players.map(p => {
    let delta = 0;
    const pot = p.potential || (p.rating + 2);
    const headroom = pot - p.rating;

    // Base growth/decline by age — gentle. Only grows if there's headroom left.
    if (p.age <= 20)      delta += headroom > 0 ? 2 : 0;
    else if (p.age <= 24) delta += headroom > 0 ? 1 : 0;
    else if (p.age <= 29) delta += 0;
    else if (p.age <= 32) delta -= 1;
    else                  delta -= 2;

    // Staff bonuses (each at most a small nudge)
    const isAtt = ["ST","LW","RW"].includes(p.pos);
    const isDef = ["CB","LB","RB"].includes(p.pos);
    if (isAtt && hasAtt && headroom > 0) delta += 1;
    if (isDef && hasDef && headroom > 0) delta += 1;
    if (p.pos === "GK" && hasGK && headroom > 0) delta += 1;

    // Academy nudge for the very young
    if (p.age <= 20 && academyLevel > 0 && headroom > 0) delta += Math.min(1, academyLevel * 0.5);

    // Morale (tiny)
    delta += moraleBonus;

    let newRating = p.rating + Math.round(delta);
    // Never exceed the player's hidden ceiling through development
    if (delta > 0) newRating = Math.min(pot, newRating);
    newRating = Math.min(99, Math.max(25, newRating));
    return { ...p, age: p.age + 1, rating: newRating };
  });
}

// Check for retirements at season end — older players may call it a day
function checkRetirements(players) {
  return players.filter(p => {
    if (p.age < 33) return true;
    // Chance increases with age: 33=5%, 34=10%, 35=20%, 36=35%, 37+=55%
    const retireChance = Math.min(0.55, (p.age - 32) * 0.10 + 0.05);
    if (Math.random() < retireChance) return false; // retired
    return true;
  });
}

// Morale tick: wins raise it, losses drop it, staff fitness coach helps
function tickMorale(morale, won, drew, hasfit) {
  let delta = won ? 4 : drew ? 0 : -5;
  if (hasfit) delta = delta >= 0 ? delta + 1 : delta + 2;
  return Math.min(100, Math.max(10, morale + delta));
}

function generateScoutFinds(scouts, division) {
  if (!scouts.length) return [];
  const finds = [];
  scouts.forEach(scout => {
    // Each scout brings back 1–2 unique prospects per season
    const count = 1 + Math.floor(Math.random() * 2);
    for (let i = 0; i < count; i++) {
      finds.push({ ...genProspect(scout.spec, division || 0), scoutedBy: scout.name });
    }
  });
  return finds;
}

// Build a 38-match fixture list with alternating home/away
function generateFixtures(leagueTable, clubName) {
  const opponents = leagueTable.map(t => t.name);
  const fixtures = [];
  // Each opponent home + away, then pad/trim to 38
  for (let i = 0; i < opponents.length; i++) {
    fixtures.push({ opponent: opponents[i], home: true });
    fixtures.push({ opponent: opponents[i], home: false });
  }
  // Shuffle
  for (let i = fixtures.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [fixtures[i], fixtures[j]] = [fixtures[j], fixtures[i]];
  }
  // Pad to 38 if needed
  while (fixtures.length < 38) {
    const opp = opponents[Math.floor(Math.random() * opponents.length)];
    fixtures.push({ opponent: opp, home: Math.random() > 0.5 });
  }
  return fixtures.slice(0, 38);
}

// Build a home+away fixture list against the real clubs in the league.
function generateFixturesReal(leagueClubs, myClubName) {
  const opponents = leagueClubs.filter(c => c.name !== myClubName).map(c => c.name);
  const fixtures = [];
  opponents.forEach(opp => {
    fixtures.push({ opponent: opp, home: true });
    fixtures.push({ opponent: opp, home: false });
  });
  for (let i = fixtures.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [fixtures[i], fixtures[j]] = [fixtures[j], fixtures[i]];
  }
  return fixtures;
}

// Budgets scale off the club's real strength + which tier it's in.
function budgetForClub(str, tierIndex) {
  // Stronger clubs and top tier => bigger budgets
  const transfer = Math.round((Math.pow(str, 2.6) * (tierIndex === 0 ? 1.4 : 0.5)) * 30);
  const wage = Math.round((Math.pow(str, 2.1) * (tierIndex === 0 ? 1.2 : 0.55)) * 1.1);
  return { transfer, wage };
}

function createNewGame(countryKey, clubName) {
  const country = COUNTRIES[countryKey];
  // Find the club and which tier it's in
  let tierIndex = 0, club = null;
  for (let t = 0; t < country.clubs.length; t++) {
    const found = country.clubs[t].find(c => c.name === clubName);
    if (found) { tierIndex = t; club = found; break; }
  }
  if (!club) { club = country.clubs[0][0]; tierIndex = 0; clubName = club.name; }

  const leagueClubs = country.clubs[tierIndex];
  const leagueTable = buildLeagueFromClubs(leagueClubs, clubName);
  const squad = genSquad(club.str);
  const { transfer, wage } = budgetForClub(club.str, tierIndex);
  // Stadium + fanbase scale with strength
  const stadiumCapacity = Math.round(2000 + club.str * 600);
  const fanBase = Math.round(club.str * 50);

  return {
    clubName, stadiumName: `${clubName} Stadium`,
    country: countryKey, countryFlag: country.flag,
    tierIndex,                                   // 0 = top flight, 1 = second tier
    tierName: country.tiers[tierIndex],
    clubStr: club.str,
    division: tierIndex,                         // kept for any legacy refs (0/1)
    season: 1, week: 1,
    transferBudget: transfer,
    wageBudget: wage,
    fanBase, stadiumCapacity,
    boardConfidence: 60,
    players: squad,
    coach: { name: "Assistant Coach", style: "Balanced", rating: Math.round(club.str*0.7), wage: Math.round(club.str*4) },
    formation: "4-4-2",
    results: [],
    leagueTable,
    fixtures: generateFixturesReal(leagueClubs, clubName),
    matchesPlayed: 0,
    wins: 0, draws: 0, losses: 0, points: 0, goalDiff: 0,
    trainingLevel: 1, academyLevel: 0,
    pendingNews: null,
    injuries: [],
    boardCredit: 0,
    logs: [`⚽ Welcome to ${clubName} — ${country.tiers[tierIndex]}. Make history.`],
    screen: "dashboard",
    squadRatingMod: 0,
    morale: 65,
    staff: [],
    scouts: [],
    scoutFinds: [],
  };
}

function buildCMCommentary(myGoals, oppGoals, players, clubName, oppName, myStr, oppStr) {
  const attackers = players.filter(p => ["ST","LW","RW","CM"].includes(p.pos));
  const defenders = players.filter(p => ["CB","LB","RB"].includes(p.pos));
  const gk = players.find(p => p.pos === "GK");
  const pickAtk  = () => attackers.length ? rand(attackers).name : "the striker";
  const pickDef  = () => defenders.length ? rand(defenders).name : "the defender";
  const pickGK   = () => gk ? gk.name : "the keeper";

  const dom = myStr / (myStr + oppStr); // 0–1, our dominance

  // Near-miss flavour lines (don't affect score)
  const nearMiss = [
    () => ({ text: `${pickAtk()} drives forward... effort blocked!`, mine: true, neutral: true }),
    () => ({ text: `${pickAtk()} hits the post! So close!`, mine: true, neutral: true }),
    () => ({ text: `${pickAtk()} heads just over the bar.`, mine: true, neutral: true }),
    () => ({ text: `${oppName} break away — ${pickGK()} makes a crucial save!`, mine: false, neutral: true }),
    () => ({ text: `${pickDef()} makes a last-ditch tackle. Vital.`, mine: true, neutral: true }),
    () => ({ text: `Shot from distance goes well wide.`, mine: true, neutral: true }),
    () => ({ text: `${oppName} pressure building. ${pickDef()} clears the lines.`, mine: false, neutral: true }),
    () => ({ text: `Chance! ${pickAtk()} one-on-one... keeper saves!`, mine: true, neutral: true }),
    () => ({ text: `${oppName} corner... headed clear by ${pickDef()}.`, mine: false, neutral: true }),
    () => ({ text: `${pickAtk()} cuts inside... curling shot... WIDE!`, mine: true, neutral: true }),
    () => ({ text: `Free kick to ${clubName}. Taken quickly. Nothing comes of it.`, mine: true, neutral: true }),
    () => ({ text: `Midfield battle. ${pickAtk()} wins the ball.`, mine: true, neutral: true }),
  ];

  // Build 90-minute event timeline
  const timeline = [];
  const goalMins = [];

  // Assign goal minutes
  const allGoalMinutes = [];
  for (let i = 0; i < myGoals; i++) allGoalMinutes.push({ mine: true, min: 1 + Math.floor(Math.random() * 89) });
  for (let i = 0; i < oppGoals; i++) allGoalMinutes.push({ mine: false, min: 1 + Math.floor(Math.random() * 89) });
  allGoalMinutes.sort((a, b) => a.min - b.min);

  // Fill with near-misses and flavour, then inject goals
  const slots = [8,14,20,27,33,38,44,52,58,63,68,73,78,84,88];
  const usedMins = new Set(allGoalMinutes.map(g => g.min));

  // Sprinkle near-misses
  let nearIdx = 0;
  for (const slot of slots) {
    if (!usedMins.has(slot) && Math.random() < (0.3 + dom * 0.3)) {
      const fn = nearMiss[nearIdx % nearMiss.length];
      nearIdx++;
      timeline.push({ min: slot, ...fn() });
    }
  }

  // Add goals
  for (const g of allGoalMinutes) {
    if (g.mine) {
      timeline.push({ min: g.min, mine: true, neutral: false, text: `GOAL!! ${pickAtk()} scores for ${clubName}!! ${clubName} lead!`, goal: true });
    } else {
      timeline.push({ min: g.min, mine: false, neutral: false, text: `GOAL! ${oppName} score. The away fans celebrate.`, goal: true });
    }
  }

  timeline.sort((a, b) => a.min - b.min);

  // Halftime split
  const ht = timeline.filter(e => e.min <= 45);
  const ft = timeline.filter(e => e.min > 45);

  return { ht, ft };
}

function MatchScreen({ game, dispatch }) {
  const [phase, setPhase]       = useState("prematch");
  const [formation, setFormation] = useState(game.formation);
  const [tactic, setTactic]     = useState("balanced");
  const [htTalk, setHtTalk]     = useState(null);
  const [htResult, setHtResult] = useState(null);
  const [finalResult, setFinalResult] = useState(null);
  const [momentum, setMomentum] = useState(50);
  const [ticker, setTicker]     = useState([]);
  const [minute, setMinute]     = useState(0);
  const [score, setScore]       = useState({ my: 0, opp: 0 });
  const [allEvents, setAllEvents] = useState([]);
  const [htEvents, setHtEvents] = useState([]);
  const [playing, setPlaying]   = useState(false);
  const tickerRef = useRef(null);

  const fixture = game.fixtures[game.matchesPlayed];
  const sqRating = effectiveRating(game.players, game.injuries || [], game.squadRatingMod || 0, game.morale || 65, game.staff || []);
  const homeBonus = fixture?.home ? 3 : -2;
  const oppClub = fixture ? (game.leagueTable || []).find(t => t.name === fixture.opponent) : null;
  const oppBaseRating = oppClub && oppClub.str
    ? oppClub.str + (Math.random() * 8 - 4)
    : Math.max(35, sqRating + (Math.random() * 20 - 10));
  const [oppRating] = useState(Math.round(oppBaseRating));
  const [myStr] = useState(Math.max(1, sqRating + homeBonus));
  const activeInjuries = (game.injuries || []).filter(i => i.weeksLeft > 0);
  const tacticMod = { balanced: 0, attacking: 4, defensive: -3, counter: 2, pressing: 3 };

  // Auto-scroll ticker
  useEffect(() => {
    if (tickerRef.current) tickerRef.current.scrollTop = tickerRef.current.scrollHeight;
  }, [ticker]);

  // Live ticker playback
  useEffect(() => {
    if (!playing || allEvents.length === 0) return;
    const remaining = allEvents.filter(e => !ticker.find(t => t === e));
    if (remaining.length === 0) {
      setPlaying(false);
      return;
    }
    const next = remaining[0];
    const delay = 800 + Math.random() * 600;
    const timer = setTimeout(() => {
      setTicker(prev => [...prev, next]);
      setMinute(next.min);
      // Update live score
      if (next.goal) {
        setScore(prev => next.mine ? { ...prev, my: prev.my + 1 } : { ...prev, opp: prev.opp + 1 });
      }
      // Shift momentum
      setMomentum(prev => {
        let m = prev;
        if (next.mine && !next.neutral) m = Math.min(85, m + (next.goal ? 15 : 5));
        else if (!next.mine && !next.neutral) m = Math.max(15, m - (next.goal ? 15 : 5));
        else if (next.mine && next.neutral) m = Math.min(75, m + 3);
        else m = Math.max(25, m - 3);
        return m;
      });
    }, delay);
    return () => clearTimeout(timer);
  }, [playing, allEvents, ticker]);

  function kickOff() {
    const str = Math.max(1, myStr + (tacticMod[tactic] || 0));
    const oppStr = Math.max(1, oppRating);
    const ht = simHalf(str, oppStr);
    const { ht: htEvts, ft: ftEvts } = buildCMCommentary(ht.myGoals, ht.oppGoals, game.players, game.clubName, fixture.opponent, str, oppStr);
    setHtResult(ht);
    setHtEvents(htEvts);
    setAllEvents(htEvts);
    setTicker([]);
    setScore({ my: 0, opp: 0 });
    setMomentum(50);
    setMinute(1);
    setPlaying(true);
    setPhase("live_ht");
  }

  function startSecondHalf() {
    const htBoost = { fire: 6, calm: 3, tactical: 4, press: 8 };
    const boost = htTalk ? (htBoost[htTalk] || 0) : 0;
    const str = Math.max(1, myStr + (tacticMod[tactic] || 0) + boost);
    const oppStr = Math.max(1, oppRating);
    const second = simHalf(str, oppStr);
    const final = { myGoals: htResult.myGoals + second.myGoals, oppGoals: htResult.oppGoals + second.oppGoals };
    const { ft: ftEvts } = buildCMCommentary(second.myGoals, second.oppGoals, game.players, game.clubName, fixture.opponent, str, oppStr);
    setFinalResult(final);
    setAllEvents(ftEvts);
    setTicker([]);
    setScore({ my: htResult.myGoals, opp: htResult.oppGoals });
    setMomentum(50);
    setMinute(46);
    setPlaying(true);
    setPhase("live_ft");

    // Dispatch result immediately (ticker plays independently)
    const won = final.myGoals > final.oppGoals;
    const drew = final.myGoals === final.oppGoals;
    dispatch({
      type: "MATCH_RESULT",
      won, drew, pts: won ? 3 : drew ? 1 : 0,
      gd: final.myGoals - final.oppGoals,
      opponent: fixture.opponent, home: fixture.home,
      score: `${final.myGoals}-${final.oppGoals}`, formation,
    });
  }

  // ── RENDER LIVE TICKER (shared for HT and FT) ──
  const renderLive = (isHT) => {
    const done = !playing && ticker.length > 0;
    const myScore = score.my;
    const oppScore = score.opp;
    const clubShort = game.clubName.length > 14 ? game.clubName.split(' ').map(w=>w[0]).join('') : game.clubName;
    const oppShort  = fixture.opponent.length > 14 ? fixture.opponent.split(' ').map(w=>w[0]).join('') : fixture.opponent;

    return (
      <div>
        {/* CM-style match header */}
        <div style={S.card}>
          <div style={S.cardGlow} />
          {/* Score board */}
          <div style={{ background: "#000080", color: "#fff", padding: "6px 10px", marginBottom: 4 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 11, fontWeight: "bold" }}>{game.clubName}</span>
              <span style={{ fontSize: 24, fontWeight: "bold", fontFamily: "'Courier New', monospace", letterSpacing: 6 }}>{myScore} - {oppScore}</span>
              <span style={{ fontSize: 11, fontWeight: "bold" }}>{fixture.opponent}</span>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "#c0d8ff", marginTop: 2 }}>
              <span>{fixture.home ? "HOME" : "AWAY"}</span>
              <span>{isHT && !done ? `${minute}'` : done && isHT ? "HT" : done && !isHT ? "FT" : `${minute}'`}</span>
              <span>Match {game.matchesPlayed + 1}</span>
            </div>
          </div>

          {/* THE MOMENTUM BAR */}
          <div style={{ marginBottom: 2 }}>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, fontWeight: "bold", marginBottom: 2 }}>
              <span style={{ color: CM.blue }}>{clubShort}</span>
              <span style={{ color: "#666" }}>— MATCH MOMENTUM —</span>
              <span style={{ color: CM.red }}>{oppShort}</span>
            </div>
            <div style={{
              height: 18, background: "#404040",
              borderTop: "2px solid #808080", borderLeft: "2px solid #808080",
              borderBottom: "2px solid #fff", borderRight: "2px solid #fff",
              position: "relative", overflow: "hidden",
            }}>
              {/* Left (us) fills from left */}
              <div style={{
                position: "absolute", left: 0, top: 0, bottom: 0,
                width: `${momentum}%`,
                background: momentum > 55 ? "#000080" : momentum > 45 ? "#408040" : "#800000",
                transition: "width 0.4s ease",
              }} />
              {/* Centre line */}
              <div style={{ position: "absolute", left: "50%", top: 0, bottom: 0, width: 2, background: "#fff", opacity: 0.5 }} />
            </div>
          </div>
        </div>

        {/* Ticker box — CM style scrolling text */}
        <div style={{ ...S.card, padding: 0 }}>
          <div style={{ background: "linear-gradient(90deg,#000080,#1084d0)", color: "#fff", padding: "2px 6px", fontSize: 10, fontWeight: "bold" }}>
            {isHT ? "First Half — Match Commentary" : "Second Half — Match Commentary"}
          </div>
          <div
            ref={tickerRef}
            style={{
              height: 180, overflowY: "auto", padding: "4px 6px",
              background: "#fff",
              borderTop: "2px solid #808080", borderLeft: "2px solid #808080",
              borderBottom: "2px solid #fff", borderRight: "2px solid #fff",
            }}
          >
            {ticker.length === 0 && playing && (
              <div style={{ color: "#808080", fontSize: 11, fontStyle: "italic" }}>Kick off! The match is underway...</div>
            )}
            {ticker.map((e, i) => (
              <div key={i} style={{
                fontSize: 11, padding: "2px 0",
                color: e.goal && e.mine ? CM.blue : e.goal && !e.mine ? CM.red : CM.text,
                fontWeight: e.goal ? "bold" : "normal",
                borderBottom: "1px solid #e0e0e0",
              }}>
                <span style={{ color: "#808080", minWidth: 28, display: "inline-block", fontFamily: "monospace" }}>{e.min}'</span>
                {e.text}
              </div>
            ))}
            {!playing && ticker.length > 0 && (
              <div style={{ fontSize: 11, color: "#808080", fontStyle: "italic", marginTop: 4 }}>
                {isHT ? "*** HALF TIME ***" : "*** FULL TIME ***"}
              </div>
            )}
          </div>
        </div>

        {/* HT: show talk options when first half done */}
        {isHT && done && (
          <div>
            <div style={S.card}>
              <div style={S.cardTitle}>Half-Time Team Talk</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                {[
                  ["fire","Fire them up! (+6 attack)"],
                  ["calm","Stay calm. (+3 all-round)"],
                  ["tactical","Tactical tweak (+4 structure)"],
                  ["press","Push for it! (+8 attack)"],
                ].map(([k, l]) => (
                  <button key={k} style={{ ...cmBtn(htTalk === k), flex: "1 1 140px" }} onClick={() => setHtTalk(k)}>
                    {htTalk === k ? "✓ " : ""}{l}
                  </button>
                ))}
              </div>
            </div>
            <button style={{ ...S.btn("primary"), fontWeight: "bold" }} onClick={startSecondHalf}>
              ► Second Half
            </button>
          </div>
        )}

        {/* FT: show result and continue */}
        {!isHT && done && finalResult && (
          <div style={S.card}>
            <div style={S.cardTitle}>Full Time</div>
            <div style={{ textAlign: "center", padding: "8px 0" }}>
              <div style={{ fontSize: 11, marginBottom: 4 }}>{game.clubName} {finalResult.myGoals} — {finalResult.oppGoals} {fixture.opponent}</div>
              <div style={{
                fontSize: 14, fontWeight: "bold",
                color: finalResult.myGoals > finalResult.oppGoals ? CM.green : finalResult.myGoals === finalResult.oppGoals ? CM.blue : CM.red,
              }}>
                {finalResult.myGoals > finalResult.oppGoals ? "WIN" : finalResult.myGoals === finalResult.oppGoals ? "DRAW" : "DEFEAT"}
                {" — "}
                {finalResult.myGoals > finalResult.oppGoals ? "+3 points" : finalResult.myGoals === finalResult.oppGoals ? "+1 point" : "No points"}
              </div>
            </div>
            <button style={{ ...S.btn("primary"), marginTop: 6 }} onClick={() => dispatch({ type: "SET_SCREEN", screen: "dashboard" })}>
              Continue →
            </button>
          </div>
        )}
      </div>
    );
  };

  if (!fixture) return (
    <div style={S.card}>
      <div style={{ fontSize: 11 }}>No more fixtures this season.</div>
    </div>
  );

  if (phase === "live_ht") return renderLive(true);
  if (phase === "live_ft") return renderLive(false);

  // Pre-match
  return (
    <div>
      <div style={S.card}>
        <div style={S.cardTitle}>Pre-Match — {fixture.home ? "Home" : "Away"}</div>
        <table style={{ width: "100%", fontSize: 11 }}>
          <tbody>
            <tr><td style={{ color: CM.textDim, width: 120 }}>Match</td><td><b>{game.clubName} vs {fixture.opponent}</b></td></tr>
            <tr><td style={{ color: CM.textDim }}>Venue</td><td>{fixture.home ? "Home" : "Away"} · Match {game.matchesPlayed + 1} of {game.fixtures.length}</td></tr>
            <tr><td style={{ color: CM.textDim }}>Your Rating</td><td><b className="cm-blue">{sqRating}</b></td></tr>
            <tr><td style={{ color: CM.textDim }}>Opp Strength</td><td>~{oppRating}</td></tr>
          </tbody>
        </table>
        {activeInjuries.length > 0 && (
          <div style={{ marginTop: 6, padding: "4px 6px", background: "#fff0f0", borderTop: "2px solid #808080", borderLeft: "2px solid #808080" }}>
            <b style={{ color: CM.red, fontSize: 10 }}>INJURED: </b>
            {activeInjuries.map(i => <span key={i.playerId} style={{ fontSize: 10 }}>{i.playerName} ({i.weeksLeft}wk) </span>)}
          </div>
        )}
      </div>

      <div style={S.card}>
        <div style={S.cardTitle}>Formation</div>
        <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginBottom: 8 }}>
          {["4-4-2","4-3-3","4-2-3-1","3-5-2","5-3-2"].map(f => (
            <button key={f} style={cmBtn(formation === f)} onClick={() => setFormation(f)}>{f}</button>
          ))}
        </div>
        <div style={S.cardTitle}>Tactics</div>
        <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
          {[["balanced","Balanced"],["attacking","Attacking"],["defensive","Defensive"],["counter","Counter"],["pressing","Pressing"]].map(([v, l]) => (
            <button key={v} style={cmBtn(tactic === v)} onClick={() => setTactic(v)}>{l}</button>
          ))}
        </div>
      </div>

      <button style={{ ...S.btn("primary"), fontWeight: "bold" }} onClick={kickOff}>
        ► Kick Off
      </button>
    </div>
  );
}

function SquadScreen({ game, dispatch }) {
  const [sort, setSort] = useState("rating");
  const sorted = [...game.players].sort((a, b) => b[sort] - a[sort]);
  return (
    <div>
      <div style={S.card}>
        <div style={S.cardGlow} />
        <div style={S.cardTitle}>Squad · {game.players.length} Players · Avg {squadRating(game.players)}</div>
        <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
          {["rating","age","wage"].map(s => (
            <button key={s} style={{ ...S.btn(sort === s ? "primary" : "ghost"), flex: 1 }} onClick={() => setSort(s)}>{s}</button>
          ))}
        </div>
        {sorted.map(p => {
          const injury = (game.injuries || []).find(i => i.playerId === p.id);
          const val = marketValue(p);
          const pot = p.potential || p.rating;
          const rising = p.age <= 23 && pot > p.rating;
          return (
            <div key={p.id} style={{ ...S.playerRow(false), opacity: injury ? 0.6 : 1 }}>
              <div style={{ ...S.ratingBadge(p.rating), background: injury ? "#5a1010" : S.ratingBadge(p.rating).background }}>
                {injury ? "🚑" : p.rating}
              </div>
              <div style={{ flex: 1, marginLeft: 10 }}>
                <div style={{ fontSize: 12, color: injury ? CM.red : CM.text }}>{p.name} {rising ? <span style={{ color: CM.green, fontSize: 10 }}>↑{pot}</span> : null}</div>
                <div style={{ fontSize: 10, color: CM.textDim }}>{p.pos} · Age {p.age} · {fmt(p.wage)}/wk {injury ? `· Out ${injury.weeksLeft}wk` : ""}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 11, color: CM.green, fontWeight: "bold" }}>{fmt(val)}</div>
                <button style={{ ...S.btn("ghost"), width: "auto", padding: "2px 8px", fontSize: 9, marginTop: 2 }} onClick={() => { if (window.confirm(`Sell ${p.name} for ${fmt(val)}?`)) dispatch({ type: "SELL_PLAYER", playerId: p.id }); }}>Sell</button>
              </div>
            </div>
          );
        })}
      </div>
      <div style={S.card}>
        <div style={S.cardGlow} />
        <div style={S.cardTitle}>Head Coach</div>
        <div style={S.playerRow(false)}>
          <div style={S.ratingBadge(game.coach.rating)}>{game.coach.rating}</div>
          <div style={{ flex: 1, marginLeft: 10 }}>
            <div style={{ fontSize: 12, color: CM.blue }}>{game.coach.name}</div>
            <div style={{ fontSize: 10, color: CM.textDim }}>{game.coach.style} · {fmt(game.coach.wage)}/wk</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── RIVALS SCREEN — scout other clubs & make offers ──────────────────────────

function RivalsScreen({ game, dispatch }) {
  const [openClub, setOpenClub] = useState(null);
  const wageTotal = game.players.reduce((a, p) => a + p.wage, 0) + game.coach.wage;
  const ceiling = game.wageBudget || 1500;
  const wageRoom = ceiling - wageTotal;

  const rivals = [...(game.leagueTable || [])].sort((a, b) => (b.str || 0) - (a.str || 0));

  if (openClub) {
    const squad = genRivalSquad(openClub.name, openClub.str || 65, game.season)
      .sort((a, b) => b.rating - a.rating);
    return (
      <div>
        <div style={S.card}>
          <div style={S.cardGlow} />
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={S.cardTitle}>{openClub.name}</div>
            <button style={{ ...S.btn("ghost"), width: "auto", padding: "4px 10px", fontSize: 10 }} onClick={() => setOpenClub(null)}>← Clubs</button>
          </div>
          <div style={{ fontSize: 11, color: "#555", marginBottom: 4 }}>Tap "Bid" to make an offer. Fee ≈ 120% of value. Your budget: {fmt(game.transferBudget)} · Wage room: {fmt(wageRoom)}/wk</div>
        </div>
        {squad.map(p => {
          const fee = Math.round(marketValue(p) * 1.2);
          const canAfford = game.transferBudget >= fee;
          const fitsWage = p.wage <= wageRoom + ceiling * 0.15;
          const ok = canAfford && fitsWage;
          return (
            <div key={p.id} style={{ ...S.card, marginBottom: 8 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <div style={S.ratingBadge(p.rating)}>{p.rating}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, color: "#e8e0d0" }}>{p.name}</div>
                  <div style={{ fontSize: 10, color: "#555" }}>{p.pos} · Age {p.age} · {fmt(p.wage)}/wk</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 11, color: canAfford ? CM.green : CM.red, fontWeight: "bold" }}>{fmt(fee)}</div>
                  <button style={{ ...S.btn(ok ? "success" : "ghost"), width: "auto", padding: "4px 12px", fontSize: 9, marginTop: 3 }}
                    onClick={() => ok && dispatch({ type: "BID_RIVAL_PLAYER", player: p, fromClub: openClub.name })} disabled={!ok}>
                    {!canAfford ? "Too dear" : !fitsWage ? "Wages" : "Bid"}
                  </button>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    );
  }

  return (
    <div>
      <div style={S.card}>
        <div style={S.cardGlow} />
        <div style={S.cardTitle}>Rival Clubs — {game.tierName}</div>
        <div style={{ fontSize: 11, color: "#555" }}>Scout any club in your league and bid for their players.</div>
      </div>
      {rivals.map(c => (
        <div key={c.name} style={{ ...S.card, marginBottom: 8 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, color: "#e8e0d0" }}>{c.name}</div>
              <div style={{ fontSize: 10, color: "#666" }}>Squad strength ~{c.str}</div>
            </div>
            <button style={{ ...S.btn("primary"), width: "auto", padding: "5px 14px", fontSize: 11 }} onClick={() => setOpenClub(c)}>View squad</button>
          </div>
        </div>
      ))}
    </div>
  );
}

function TransferScreen({ game, dispatch }) {
  const [filter, setFilter] = useState("ALL");
  const [search, setSearch] = useState("");
  const [showAll, setShowAll] = useState(false);
  const positions = ["ALL","GK","CB","LB","RB","CM","LW","RW","ST"];

  const available = MARKET_PLAYERS.filter(p => {
    const posMatch = filter === "ALL" || p.pos === filter;
    const searchMatch = !search || p.name.toLowerCase().includes(search.toLowerCase());

    const divMatch = showAll ? true : p.minDiv <= game.division + 1;
    return posMatch && searchMatch && notOwned && divMatch;

  return (

        <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginBottom: 8 }}>

function applyNewsEffect(state, effect) {
  let s = { ...state };
  if (effect.money) s.transferBudget = Math.max(0, (s.transferBudget || 0) + effect.money);
  if (effect.boardConfidence) s.boardConfidence = Math.min(100, Math.max(0, s.boardConfidence + effect.boardConfidence));
  if (effect.fanBase) s.fanBase = Math.max(50, s.fanBase + effect.fanBase);
  if (effect.stadiumCapacity) s.stadiumCapacity = s.stadiumCapacity + effect.stadiumCapacity;
  if (effect.squadRatingMod) s.squadRatingMod = (s.squadRatingMod || 0) + effect.squadRatingMod;
  if (effect.newPlayer) s.players = [...s.players, { ...effect.newPlayer, id: Date.now() }];
  if (effect.morale) s.morale = Math.min(100, Math.max(10, (s.morale || 65) + effect.morale));
  // Individual player development boosts from news
  if (effect.devBoost) {
    s.players = s.players.map(p => {
      const match = !effect.devBoost.pos || effect.devBoost.pos === p.pos;
      if (!match) return p;
      return { ...p, rating: Math.min(99, p.rating + effect.devBoost.amount) };
    });
  }
  return s;
}

function pickNewsEvent(matchesPlayed) {
  // Fire every 3-4 matches for more drama
  if (matchesPlayed > 0 && matchesPlayed % (3 + Math.floor(Math.random() * 2)) === 0) {
    // Alternate between club news and world news
    const pool = matchesPlayed % 6 < 3 ? NEWS_EVENTS_OWN : NEWS_EVENTS_WORLD;
    return pool[Math.floor(Math.random() * pool.length)];
  }
  return null;
}

function reducer(state, action) {
  switch (action.type) {
    case "SET_SCREEN":
      return { ...state, screen: action.screen };

    case "MATCH_RESULT": {
      const isHome = action.home;
      const fillRate = isHome ? 0.5 + Math.random() * 0.35 : 0;
      const attendance = isHome ? Math.round(state.stadiumCapacity * fillRate) : 0;
      // Ticket price scales with division — Sunday League £8, Premier League £26
      const ticketPrice = 8 + state.division * 2;
      const matchday_income = isHome ? attendance * ticketPrice : 0;
      // Away travel costs a small amount
      const travelCost = isHome ? 0 : 150 + state.division * 50;
      // FM model: matches don't drain a bank balance. Surplus revenue tops up the
      // transfer budget; overspending the wage ceiling is penalised instead.
      const wageTotal = state.players.reduce((a, p) => a + p.wage, 0) + state.coach.wage;
      const sponsorIncome = Math.round(800 + state.division * 600 + state.fanBase * 0.15);
      const wageBudget = state.wageBudget || TIER_WAGE_BUDGET[state.division] || 1500;
      const overWage = Math.max(0, wageTotal - wageBudget);
      // Matchday + sponsor income converts to a small transfer-budget top-up per match
      const surplus = Math.round((matchday_income + sponsorIncome - travelCost) * 0.5);
      // If over the wage ceiling, the board claws money back from your budget and loses faith
      const wagePenalty = overWage > 0 ? Math.round(overWage * 4) : 0;
      const newTransferBudget = Math.max(0, (state.transferBudget || 0) + surplus - wagePenalty);
      const wageMsg = overWage > 0
        ? `⚠️ Wage bill ${fmt(wageTotal)}/wk over the ${fmt(wageBudget)} ceiling — board docked ${fmt(wagePenalty)}.`
        : null;

      const hasFit = (state.staff || []).some(s => s.effect === "fitness");
      const physioPresent = (state.staff || []).some(s => s.effect === "physio");
      const newMorale = tickMorale(state.morale || 65, action.won, action.drew, hasFit);
      const newFans = state.fanBase + (action.won ? 15 + state.division * 5 : action.drew ? 2 : -8);
      // Tick existing injuries down, potentially add a new one
      // Physio reduces each injury by an extra week
      const physio = (state.staff || []).some(s => s.effect === "physio");
      const rawTicked = tickInjuries(state.injuries || []);
      const tickedInjuries = physio
        ? rawTicked.map(i => ({ ...i, weeksLeft: Math.max(0, i.weeksLeft - 1) })).filter(i => i.weeksLeft > 0)
        : rawTicked;
      const newInjuries = maybeInjury(state.players, tickedInjuries);
      const injuryMsg = newInjuries.length > tickedInjuries.length
        ? `🚑 ${newInjuries[newInjuries.length-1].playerName} injured — ${newInjuries[newInjuries.length-1].weeksLeft} weeks out`
        : null;
      const newBoard = Math.min(100, Math.max(0, state.boardConfidence + (action.won ? 3 : action.drew ? 0 : -5) - (overWage > 0 ? 4 : 0)));
      const newMatchesPlayed = state.matchesPlayed + 1;
      const newWeek = state.week + 1;

      const newTable = state.leagueTable.map(t => {
        if (t.name === action.opponent) {
          const oppPts = action.won ? 0 : action.drew ? 1 : 3;
          return { ...t, played: t.played + 1, won: t.won + (action.won ? 0 : action.drew ? 0 : 1), drawn: t.drawn + (action.drew ? 1 : 0), lost: t.lost + (action.won ? 1 : 0), gd: t.gd + (action.drew ? 0 : action.won ? -Math.abs(action.gd) : Math.abs(action.gd)), pts: t.pts + oppPts };
        }
        const s = t.str || 65;
        const winChance = 0.25 + Math.max(0, Math.min(0.45, (s - 60) / 60));
        const r = Math.random();
        const wt = r < winChance ? 1 : 0;
        const dt = (!wt && r < winChance + 0.25) ? 1 : 0;
        return { ...t, played: t.played + 1, won: t.won + wt, drawn: t.drawn + dt, lost: t.lost + (wt === 0 && dt === 0 ? 1 : 0), gd: t.gd + (wt ? 1 : dt ? 0 : -1), pts: t.pts + (wt ? 3 : dt ? 1 : 0) };
      });

      const loc = isHome ? "H" : "A";
      const resultStr = `[${loc}] ${action.score} vs ${action.opponent} — ${action.won ? "W ✓" : action.drew ? "D" : "L ✗"}`;
      const trimmed = state.logs.slice(-25);
      let newLogs = [...trimmed, resultStr];
      if (injuryMsg) newLogs.push(injuryMsg);
      if (wageMsg) newLogs.push(wageMsg);

      // Check for news event
      const newsEvent = pickNewsEvent(newMatchesPlayed);

      // Season end — length depends on number of fixtures in this league
      if (newMatchesPlayed >= state.fixtures.length) {
        const myPts = state.points + action.pts;
        const myGd = state.goalDiff + action.gd;
        const standings = [
          { name: state.clubName, pts: myPts, gd: myGd, isPlayer: true },
          ...newTable.map(t => ({ name: t.name, pts: t.pts, gd: t.gd })),
        ].sort((a, b) => b.pts - a.pts || b.gd - a.gd);
        const finishPos = standings.findIndex(t => t.isPlayer) + 1;
        const lastPos = standings.length;
        const country = COUNTRIES[state.country];
        const champions = finishPos === 1;
        // tierIndex: 0 = top flight, 1 = second tier
        const canPromote = state.tierIndex === 1 && finishPos <= 2;
        const canRelegate = state.tierIndex === 0 && finishPos >= lastPos - 1;
        const newTier = canPromote ? 0 : canRelegate ? 1 : state.tierIndex;
        const tierChanged = newTier !== state.tierIndex;
        const prizeMoney = Math.round(state.clubStr * 200 * (state.tierIndex === 0 ? 2 : 1) + (champions ? state.clubStr * 300 : 0));
        const tierName = country.tiers[newTier];
        const endMsg = champions && canPromote ? `🏆 CHAMPIONS! Promoted to ${tierName}!`
                     : champions ? `🏆 CHAMPIONS of ${country.tiers[state.tierIndex]}!`
                     : canPromote ? `🎉 PROMOTED to ${tierName} (finished ${ord(finishPos)})!`
                     : canRelegate ? `😢 Relegated to ${tierName} (finished ${ord(finishPos)}).`
                     : `🏁 Season ${state.season} ended ${ord(finishPos)} in ${country.tiers[state.tierIndex]}.`;
        // New league = real clubs of the destination tier (minus your club)
        const destClubs = country.clubs[newTier];
        const newLeague = buildLeagueFromClubs(destClubs, state.clubName);
        const developed = developPlayers(state.players, state.staff || [], state.morale || 65, state.academyLevel);
        const afterRetire = checkRetirements(developed);
        const retirees = developed.filter(p => !afterRetire.find(r => r.id === p.id));
        const retireLog = retirees.length > 0 ? `👋 ${retirees.map(r => r.name).join(", ")} retired.` : null;
        const newScoutFinds = generateScoutFinds(state.scouts || [], newTier === 0 ? 6 : 4);

        // ─── EUROPEAN COMPETITIONS ───────────────────────────────────────────
        // Run last season's campaign (if you qualified previously), then set next.
        const mySquadStr = effectiveRating(state.players, [], state.squadRatingMod || 0, 70, state.staff || []);
        let euroLogs = [];
        let euroPrize = 0;
        if (state.europeanCup) {
          const cup = state.europeanCup; // {name, tier}  tier: "CL" or "EL"
          const rounds = ["Group Stage", "Round of 16", "Quarter-Final", "Semi-Final", "Final"];
          // Stronger field in CL; your odds scale with squad strength
          const fieldStr = cup.tier === "CL" ? 80 : 73;
          let stage = 0;
          for (let r = 0; r < rounds.length; r++) {
            const winP = Math.max(0.15, Math.min(0.85, 0.5 + (mySquadStr - fieldStr) / 40));
            if (Math.random() < winP) stage = r + 1; else break;
          }
          const perRound = cup.tier === "CL" ? 3500 : 1800;
          euroPrize = stage * perRound + (stage >= rounds.length ? perRound * 3 : 0);
          const reached = stage >= rounds.length ? "WON THE TROPHY 🏆🌟"
                        : stage === 0 ? "knocked out in the Group Stage"
                        : `reached the ${rounds[stage - 1]}`;
          euroLogs.push(`🌍 ${cup.name}: ${reached}. Prize: ${fmt(euroPrize)}`);
        }
        // Qualify for next season based on this season's top-flight finish
        let nextEuro = null;
        if (newTier === 0) { // will be in the top flight next season
          if (finishPos <= 2)      nextEuro = { name: "Champions League", tier: "CL" };
          else if (finishPos <= 5) nextEuro = { name: "Europa League", tier: "EL" };
        }
        const euroQualMsg = nextEuro ? `✨ Qualified for the ${nextEuro.name}!` : null;

        // Budgets recomputed from club strength + tier; promotion is a real windfall
        const { transfer, wage } = budgetForClub(state.clubStr, newTier);
        const baseBudget = newTransferBudget + prizeMoney + euroPrize;
        const tierBudget = canPromote ? baseBudget + transfer
                         : canRelegate ? Math.min(baseBudget, transfer * 1.5)
                         : baseBudget;
        const budgetMsg = tierChanged
          ? `💷 ${canPromote ? "Promotion windfall" : "Budget adjusted"}: transfer funds now ${fmt(Math.round(tierBudget))}, wage ceiling ${fmt(wage)}/wk.`
          : null;
        return {
          ...state,
          transferBudget: Math.round(tierBudget),
          wageBudget: wage,
          tierIndex: newTier,
          tierName,
          division: newTier,
          fanBase: Math.max(100, newFans),
          boardConfidence: newBoard,
          season: state.season + 1,
          week: 1,
          matchesPlayed: 0,
          wins: 0, draws: 0, losses: 0, points: 0, goalDiff: 0,
          results: [],
          formation: action.formation,
          leagueTable: newLeague,
          fixtures: generateFixturesReal(destClubs, state.clubName),
          pendingNews: null,
          injuries: [],
          boardCredit: 0,
          morale: Math.min(100, (state.morale || 65) + 5),
          players: afterRetire,
          scoutFinds: newScoutFinds,
          europeanCup: nextEuro,
          logs: [...newLogs, ...euroLogs, endMsg, ...(euroQualMsg ? [euroQualMsg] : []), ...(budgetMsg ? [budgetMsg] : []), ...(retireLog ? [retireLog] : [])],
          screen: "dashboard",
        };
      }

      return {
        ...state,
        transferBudget: newTransferBudget,
        fanBase: Math.max(100, newFans),
        boardConfidence: newBoard,
        injuries: newInjuries,
        morale: newMorale,
        wins: state.wins + (action.won ? 1 : 0),
        draws: state.draws + (action.drew ? 1 : 0),
        losses: state.losses + (!action.won && !action.drew ? 1 : 0),
        points: state.points + action.pts,
        goalDiff: state.goalDiff + action.gd,
        matchesPlayed: newMatchesPlayed,
        week: newWeek,
        results: [...state.results, { opponent: action.opponent, score: action.score, won: action.won, drew: action.drew, home: action.home }],
        leagueTable: newTable,
        formation: action.formation,
        pendingNews: newsEvent || null,
        logs: newLogs,
        screen: newsEvent ? "dashboard" : "dashboard",
      };
    }

    case "RESOLVE_NEWS": {
      const s = applyNewsEffect(state, action.effect);
      // Board credit: positive outcomes build credit, negative drain it
      const creditDelta = (action.effect.boardConfidence || 0) > 0 ? 1
                        : (action.effect.boardConfidence || 0) < 0 ? -1
                        : (action.effect.money || 0) > 0 ? 1
                        : (action.effect.fanBase || 0) > 20 ? 1
                        : 0;
      const newCredit = Math.max(-5, Math.min(10, (s.boardCredit || 0) + creditDelta));
      // Every 5 credit points = board grants a £5,000 transfer bonus
      let bonusMoney = 0;
      let bonusLog = null;
      if (newCredit >= 5) {
        bonusMoney = 5000;
        bonusLog = "🏦 Board impressed — granted £5,000 transfer bonus!";
      } else if (newCredit <= -3) {
        bonusLog = "⚠️ Board losing patience with your decisions.";
      }
      return {
        ...s,
        pendingNews: null,
        boardCredit: bonusMoney > 0 ? 0 : newCredit,
        transferBudget: (s.transferBudget || 0) + bonusMoney,
        boardConfidence: bonusMoney > 0 ? Math.min(100, s.boardConfidence + 3) : s.boardConfidence,
        logs: [...s.logs.slice(-25), `📰 ${action.label}`, ...(bonusLog ? [bonusLog] : [])],
      };
    }

    case "BUY_PLAYER": {
      const p = action.player;
      if ((state.transferBudget || 0) < p.price) return state;
      return { ...state, transferBudget: state.transferBudget - p.price, players: [...state.players, { ...p, id: Date.now() }], logs: [...state.logs.slice(-25), `💰 Signed ${p.name} for ${fmt(p.price)}`] };
    }

    case "SELL_PLAYER": {
      const p = state.players.find(pl => pl.id === action.playerId);
      if (!p) return state;
      if (state.players.length <= 11) return { ...state, logs: [...state.logs.slice(-25), `⚠️ Can't sell — squad too thin (min 11).`] };
      const fee = marketValue(p);
      return {
        ...state,
        transferBudget: (state.transferBudget || 0) + fee,
        players: state.players.filter(pl => pl.id !== action.playerId),
        injuries: (state.injuries || []).filter(i => i.playerId !== action.playerId),
        logs: [...state.logs.slice(-25), `🤝 Sold ${p.name} (${p.rating}) for ${fmt(fee)}`],
      };
    }

    case "SACK_COACH":
      return { ...state, boardConfidence: Math.max(0, state.boardConfidence - 8), coach: { name: "Vacant", style: "-", rating: 0, wage: 0 }, logs: [...state.logs.slice(-25), `🔥 ${state.coach.name} sacked.`] };

    case "HIRE_COACH":
      return { ...state, coach: action.coach, logs: [...state.logs.slice(-25), `📋 ${action.coach.name} appointed.`] };

    case "UPGRADE_STADIUM":
      if ((state.transferBudget || 0) < 25000) return state;
      return { ...state, transferBudget: state.transferBudget - 25000, stadiumCapacity: state.stadiumCapacity + 500, logs: [...state.logs.slice(-25), `🏟️ Stadium expanded to ${state.stadiumCapacity + 500}.`] };

    case "UPGRADE_TRAINING":
      if ((state.transferBudget || 0) < 15000) return state;
      return { ...state, transferBudget: state.transferBudget - 15000, trainingLevel: state.trainingLevel + 1, players: state.players.map(p => ({ ...p, rating: Math.min(p.potential || p.rating + 1, p.rating + 1) })), logs: [...state.logs.slice(-25), `⬆️ Training ground Level ${state.trainingLevel + 1}.`] };

    case "UPGRADE_ACADEMY":
      if ((state.transferBudget || 0) < 20000) return state;
      return { ...state, transferBudget: state.transferBudget - 20000, academyLevel: state.academyLevel + 1, logs: [...state.logs.slice(-25), `🌱 Academy Level ${state.academyLevel + 1}.`] };

    case "HIRE_STAFF": {
      const alreadyHired = (state.staff || []).find(s => s.id === action.staff.id);
      if (alreadyHired) return state;
      return { ...state, staff: [...(state.staff || []), action.staff], logs: [...state.logs.slice(-25), `✅ ${action.staff.name} joined the backroom team.`] };
    }
    case "FIRE_STAFF":
      return { ...state, staff: (state.staff || []).filter(s => s.id !== action.staffId), logs: [...state.logs.slice(-25), `🔥 Staff member dismissed.`] };

    case "HIRE_SCOUT": {
      const already = (state.scouts || []).find(s => s.id === action.scout.id);
      if (already) return state;
      return { ...state, scouts: [...(state.scouts || []), action.scout], logs: [...state.logs.slice(-25), `🔍 ${action.scout.name} hired as scout.`] };
    }
    case "FIRE_SCOUT":
      return { ...state, scouts: (state.scouts || []).filter(s => s.id !== action.scoutId), logs: [...state.logs.slice(-25), `🔥 Scout dismissed.`] };

    case "BID_RIVAL_PLAYER": {
      const p = action.player;
      const fee = Math.round(marketValue(p) * 1.2);
      if ((state.transferBudget || 0) < fee) return state;
      const newWageTotal = state.players.reduce((a, pl) => a + pl.wage, 0) + state.coach.wage + p.wage;
      const ceiling = state.wageBudget || 1500;
      if (newWageTotal > ceiling * 1.15) {
        return { ...state, logs: [...state.logs.slice(-25), `❌ Can't sign ${p.name} — wages would blow the ceiling.`] };
      }
      return {
        ...state,
        transferBudget: state.transferBudget - fee,
        players: [...state.players, { ...p, id: uid() }],
        logs: [...state.logs.slice(-25), `✍️ Signed ${p.name} (${p.rating}) from ${action.fromClub} for ${fmt(fee)}`],
      };
    }

    case "SIGN_SCOUT_FIND": {
      const p = action.player;
      if ((state.transferBudget || 0) < p.price) return state;
      return {
        ...state,
        transferBudget: state.transferBudget - p.price,
        players: [...state.players, { ...p, id: uid() }],
        scoutFinds: (state.scoutFinds || []).filter(f => f.id !== p.id),
        logs: [...state.logs.slice(-25), `💰 Signed ${p.name} (scouted) for ${fmt(p.price)}`],
      };
    }

    default:
      return state;
  }
}

// ─── SETUP SCREEN ─────────────────────────────────────────────────────────────

function SetupScreen({ onStart }) {
  const [country, setCountry] = useState(null);
  const [tier, setTier] = useState(0);

  // Strength → simple star/label so the player can judge a club at a glance
  function strLabel(s) {
    if (s >= 82) return { t: "Elite",     c: CM.green };
    if (s >= 74) return { t: "Strong",    c: CM.blue };
    if (s >= 66) return { t: "Mid-table", c: CM.text };
    if (s >= 60) return { t: "Battler",   c: CM.textDim };
    return { t: "Underdog", c: CM.red };
  }

  return (
    <div style={{ background: CM.bg, minHeight: "100vh", fontFamily: "Arial, sans-serif", fontSize: 12 }}>
      {/* CM title bar */}
      <div style={{ background: "linear-gradient(90deg,#000080,#1084d0)", color: "#fff", padding: "4px 8px", fontSize: 12, fontWeight: "bold", display: "flex", justifyContent: "space-between" }}>
        <span>Championship Manager — New Game</span>
      </div>

      <div style={{ padding: "8px" }}>
        <div style={{ background: CM.bg, borderTop: "2px solid #808080", borderLeft: "2px solid #808080", borderBottom: "2px solid #fff", borderRight: "2px solid #fff", padding: 8, marginBottom: 6 }}>
          <div style={{ fontSize: 14, fontWeight: "bold", color: CM.blue, marginBottom: 4 }}>Select Your Club</div>
          <div style={{ fontSize: 11, color: CM.textDim }}>Choose a country, league and team to manage. Good luck.</div>
        </div>

        {!country && (
          <div style={{ background: CM.bg, borderTop: "2px solid #808080", borderLeft: "2px solid #808080", borderBottom: "2px solid #fff", borderRight: "2px solid #fff", padding: 6 }}>
            <div style={{ background: "linear-gradient(90deg,#000080,#1084d0)", color: "#fff", padding: "2px 6px", fontSize: 10, fontWeight: "bold", marginBottom: 4 }}>Country</div>
            {Object.keys(COUNTRIES).map((key, i) => (
              <div key={key} style={{ display: "flex", alignItems: "center", gap: 8, padding: "3px 4px", background: i % 2 === 0 ? "#fff" : "#dce4f0", borderBottom: "1px solid #d0d0d0", cursor: "pointer" }} onClick={() => { setCountry(key); setTier(0); }}>
                <span style={{ fontSize: 16 }}>{COUNTRIES[key].flag}</span>
                <span style={{ flex: 1, fontSize: 12, fontWeight: "bold" }}>{key}</span>
                <span style={{ fontSize: 10, color: CM.textDim }}>{COUNTRIES[key].tiers.join(" / ")}</span>
                <span style={{ color: CM.blue, fontSize: 10 }}>Select ►</span>
              </div>
            ))}
          </div>
        )}

        {country && (
          <div>
            <div style={{ background: CM.bg, borderTop: "2px solid #808080", borderLeft: "2px solid #808080", padding: 6, marginBottom: 6 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
                <span style={{ fontSize: 18 }}>{COUNTRIES[country].flag}</span>
                <span style={{ fontSize: 13, fontWeight: "bold" }}>{country}</span>
                <button style={cmBtn(false)} onClick={() => setCountry(null)}>◄ Back</button>
              </div>
              <div style={{ display: "flex", gap: 4 }}>
                {COUNTRIES[country].tiers.map((tn, i) => (
                  <button key={i} style={cmBtn(tier === i)} onClick={() => setTier(i)}>{tn}</button>
                ))}
              </div>
            </div>

            <div style={{ background: CM.bg, borderTop: "2px solid #808080", borderLeft: "2px solid #808080", borderBottom: "2px solid #fff", borderRight: "2px solid #fff", padding: 6 }}>
              <div style={{ background: "linear-gradient(90deg,#000080,#1084d0)", color: "#fff", padding: "2px 6px", fontSize: 10, fontWeight: "bold", marginBottom: 0 }}>
                <table style={{ width: "100%" }}><tbody><tr>
                  <td style={{ width: "50%" }}>Club</td>
                  <td style={{ width: "20%", textAlign: "center" }}>Str</td>
                  <td style={{ width: "20%", textAlign: "center" }}>Level</td>
                  <td style={{ width: "10%" }}></td>
                </tr></tbody></table>
              </div>
              {[...COUNTRIES[country].clubs[tier]].sort((a, b) => b.str - a.str).map((club, i) => {
                const lab = strLabel(club.str);
                return (
                  <div key={club.name} style={{ display: "flex", alignItems: "center", gap: 6, padding: "3px 4px", background: i % 2 === 0 ? "#fff" : "#dce4f0", borderBottom: "1px solid #d0d0d0" }}>
                    <span style={{ flex: 1, fontSize: 11, fontWeight: "bold" }}>{club.name}</span>
                    <span style={{ width: 30, textAlign: "center", fontSize: 11, fontWeight: "bold", color: CM.blue }}>{club.str}</span>
                    <span style={{ width: 70, textAlign: "center", fontSize: 10, color: lab.c }}>{lab.t}</span>
                    <button style={cmBtn(false)} onClick={() => onStart(country, club.name)}>Manage</button>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────

const STORAGE_KEY = "football-empire-v9";

function App() {
  const [game, setGame] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    async function load() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (saved?.value) setGame(JSON.parse(saved.value));
      } catch (e) {}
      setLoading(false);
    }
    load();
  }, []);

  function save(g) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(g)); } catch (e) {}
  }

  function dispatch(action) {
    setGame(prev => {
      const next = reducer(prev, action);
      save(next);
      return next;
    });
  }

  function startGame(countryKey, clubName) {
    const g = createNewGame(countryKey, clubName);
    setGame(g); save(g);
  }

  async function resetGame() {
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    setGame(null);
  }

  if (loading) return <div style={{ ...S.app, display: "flex", alignItems: "center", justifyContent: "center" }}><div style={{ color: CM.blue, fontSize: 12, fontWeight: "bold" }}>Loading Championship Manager...</div></div>;
  if (!game) return <SetupScreen onStart={startGame} />;

  const TABS = [
    { id: "dashboard", label: "Overview" },
    { id: "match",     label: "Match" },
    { id: "squad",     label: "Squad" },
    { id: "transfers", label: "Transfers" },
    { id: "rivals",    label: "Rivals" },
    { id: "staff",     label: "Staff" },
    { id: "boardroom", label: "Boardroom" },
    { id: "club",      label: "Club" },
  ];

  return (
    <div style={S.app}>
      <div style={S.scanlines} />

      {/* News overlay — blocks progress until decided */}
      {game.pendingNews && (
        <NewsOverlay
          event={game.pendingNews}
          onDecide={(opt) => dispatch({ type: "RESOLVE_NEWS", effect: opt.effect, label: opt.label })}
        />
      )}

      <div style={S.header}>
        <div>
          <span style={S.clubName}>Championship Manager — {game.clubName}</span>
          <span style={{ ...S.divBadge, marginLeft: 10 }}>{game.countryFlag} {game.tierName || DIVISIONS[game.division]} · Season {game.season} · Week {game.week}</span>
        </div>
        <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
          <span style={S.statVal}>Budget: {fmt(game.transferBudget)}</span>
          <span style={S.statVal}>Pts: {game.points}</span>
          <button style={{ ...cmBtn(false), fontSize: 10, padding: "1px 6px" }} onClick={resetGame} title="New Game">New Game</button>
        </div>
      </div>

      <div style={S.nav}>
        {TABS.map(t => (
          <button key={t.id} style={S.navBtn(game.screen === t.id)} onClick={() => dispatch({ type: "SET_SCREEN", screen: t.id })}>
            {t.label}
          </button>
        ))}
      </div>

      <div style={S.main}>
        {game.screen === "dashboard" && <Dashboard game={game} dispatch={dispatch} />}
        {game.screen === "match" && <MatchScreen key={`${game.season}-${game.matchesPlayed}`} game={game} dispatch={dispatch} />}
        {game.screen === "squad" && <SquadScreen game={game} dispatch={dispatch} />}
        {game.screen === "transfers" && <TransferScreen game={game} dispatch={dispatch} />}
        {game.screen === "rivals" && <RivalsScreen game={game} dispatch={dispatch} />}
        {game.screen === "staff" && <StaffScreen game={game} dispatch={dispatch} />}
        {game.screen === "boardroom" && <BoardroomScreen game={game} dispatch={dispatch} />}
        {game.screen === "club" && <ClubScreen game={game} dispatch={dispatch} />}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
