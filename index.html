// Generate one scouted prospect. Every player has a HIDDEN potential ceiling — the gamble.
function genProspect(spec, division){
  const youthBias = spec === "Youth" || spec === "Local";
  const age = youthBias ? 16 + Math.floor(Math.random()*4)
                        : 19 + Math.floor(Math.random()*9);
  const base = 38 + division*6;
  let current = base + Math.floor(Math.random()*16) - 6;
  current = Math.max(40, Math.min(78, current));
  const roll = Math.random();
  let potBonus;
  if (roll < 0.55)      potBonus = 2 + Math.floor(Math.random()*6);
  else if (roll < 0.85) potBonus = 8 + Math.floor(Math.random()*8);
  else if (roll < 0.97) potBonus = 16 + Math.floor(Math.random()*12);
  else                  potBonus = 28 + Math.floor(Math.random()*14);
  const ageRoom = age <= 18 ? 6 : age <= 21 ? 3 : 0;
  const potential = Math.min(99, current + potBonus + ageRoom);
  const pos = rand(POSITIONS);
  const price = Math.round((current*current*1.4 + division*1500) * (0.8+Math.random()*0.5));
  const wage = Math.round(30 + current*2.5 + division*15);
  const gap = potential - current;
  const hint = gap >= 28 ? "⭐ Scouts are raving — could be generational"
             : gap >= 16 ? "🔥 High ceiling — real potential here"
             : gap >= 8  ? "📈 Room to grow"
             : "Looks like a steady squad option";
  return { name: `${rand(FIRST_NAMES)} ${rand(LAST_NAMES)}`, pos, age, rating: current, potential, wage, price, hint, scoutSpec: spec, id: uid() };
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────


function fmt(n) {
  if (n >= 1000000) return `£${(n / 1000000).toFixed(1)}M`;
  if (n >= 1000) return `£${(n / 1000).toFixed(0)}K`;
  return `£${Math.round(n)}`;
}

function ord(n) {
  const s = ["th","st","nd","rd"], v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

// Market value: rises steeply with rating, boosted by youth + hidden potential.
// This is what makes "develop a gem then sell high" profitable.
function marketValue(p) {
  const r = p.rating;
  let base = Math.pow(r, 2.4) * 0.9;            // exponential — high rating = big money
  const pot = p.potential || r;
  const ageF = p.age <= 21 ? 1.6 : p.age <= 25 ? 1.3 : p.age <= 29 ? 1.0 : p.age <= 32 ? 0.6 : 0.3;
  const potF = 1 + Math.max(0, (pot - r)) * 0.03; // unrealised potential adds value
  return Math.round(base * ageF * potF);
}

function squadRating(players) {
  if (!players.length) return 0;
  return Math.round(players.reduce((a, p) => a + p.rating, 0) / players.length);
}

// Realistic goal sim: typical match ends 0-0 to 2-1
function simHalf(myStr, oppStr) {
  const dom = myStr / (myStr + oppStr);
  function goals(d) {
    const r = Math.random();
    if (r < 0.30) return 0;
    if (r < 0.62) return d > 0.45 ? 1 : 0;
    if (r < 0.85) return d > 0.40 ? 1 : 0;
    return d > 0.55 ? 2 : 1;
  }
  return { myGoals: goals(dom), oppGoals: goals(1 - dom) };
}

// Build minute-by-minute commentary for a half (the "watching it unfold" feel).
// startMin/endMin frame the half; scorers picked from your outfield players.
function buildCommentary(myGoals, oppGoals, players, clubName, oppName, startMin, endMin) {
  const attackers = players.filter(p => ["ST","LW","RW","CM"].includes(p.pos));
  const pickScorer = () => attackers.length ? rand(attackers).name : "the striker";
  const events = [];
  for (let i = 0; i < myGoals; i++) events.push({ mine: true });
  for (let i = 0; i < oppGoals; i++) events.push({ mine: false });
  // assign minutes
  events.forEach(e => { e.min = startMin + Math.floor(Math.random() * (endMin - startMin)); });
  events.sort((a, b) => a.min - b.min);
  const lines = events.map(e => e.mine
    ? { min: e.min, mine: true,  text: `⚽ GOAL! ${pickScorer()} scores for ${clubName}!` }
    : { min: e.min, mine: false, text: `💥 ${oppName} score.` });
  // a couple of flavour near-misses if quiet
  if (lines.length === 0) {
    const m = startMin + Math.floor(Math.random()*(endMin-startMin));
    lines.push({ min: m, mine: true, neutral: true, text: `${pickScorer()} fires just wide — tight half.` });
  }
  return lines;
}

// Random injury event — fires ~20% of matches
function maybeInjury(players, injuries) {
  if (Math.random() > 0.20) return injuries; // no injury
  const healthy = players.filter(p => !injuries.find(i => i.playerId === p.id));
  if (!healthy.length) return injuries;
  const victim = healthy[Math.floor(Math.random() * healthy.length)];
  const weeks = 2 + Math.floor(Math.random() * 5); // 2–6 weeks out
  return [...injuries, { playerId: victim.id, playerName: victim.name, weeksLeft: weeks }];
}

// Tick injuries down by 1 week, return updated list
function tickInjuries(injuries) {
  return injuries.map(i => ({ ...i, weeksLeft: i.weeksLeft - 1 })).filter(i => i.weeksLeft > 0);
}

// Effective squad rating accounting for injuries
function effectiveRating(players, injuries, mod, morale, staff) {
  const injuredIds = new Set(injuries.map(i => i.playerId));
  const available = players.filter(p => !injuredIds.has(p.id));
  if (!available.length) return 30;
  const base = Math.round(available.reduce((a, p) => a + p.rating, 0) / available.length);
  const moraleBonus = morale >= 75 ? 2 : morale <= 40 ? -3 : 0;
  const analystBonus = (staff || []).some(s => s.effect === "analyst") ? 2 : 0;
  return base + (mod || 0) + moraleBonus + analystBonus;
}

// Apply end-of-season player development: aging, staff bonuses, morale gains
function developPlayers(players, staff, morale, academyLevel) {
  const hasAtt  = staff.some(s => s.effect === "attackers");
  const hasDef  = staff.some(s => s.effect === "defenders");
  const hasGK   = staff.some(s => s.effect === "gk");
  const hasFit  = staff.some(s => s.effect === "fitness");
  const moraleBonus = morale >= 75 ? 1 : morale <= 40 ? -1 : 0;

  return players.map(p => {
    let delta = 0;
    // Peak age 22–28: develop. After 30: slight decline. After 33: faster decline.
    if (p.age < 22)       delta += 2;
    else if (p.age <= 28) delta += 1;
    else if (p.age <= 30) delta += 0;
    else if (p.age <= 33) delta -= 1;
    else                  delta -= 2;

    // Staff bonuses
    const isAtt = ["ST","LW","RW"].includes(p.pos);
    const isDef = ["CB","LB","RB"].includes(p.pos);
    if (isAtt && hasAtt) delta += 1;
    if (isDef && hasDef) delta += 1;
    if (p.pos === "GK" && hasGK) delta += 2;
    if (hasFit) delta += 0.5;

    // Academy bonus for young players
    if (p.age <= 21 && academyLevel > 0) delta += academyLevel * 0.5;

    // Morale effect
    delta += moraleBonus;

    // Young players with headroom toward their hidden potential grow faster
    const pot = p.potential || (p.rating + 4);
    if (p.age <= 23 && p.rating < pot) {
      const headroom = pot - p.rating;
      // Bigger jumps the further below potential they are (the wonderkid surge)
      delta += Math.min(6, Math.ceil(headroom / 4));
    }

    let newRating = p.rating + Math.round(delta);
    // Hard cap at hidden potential while still developing; natural decline can go below later
    if (p.age <= 30) newRating = Math.min(pot, newRating);
    newRating = Math.min(99, Math.max(25, newRating));
    return { ...p, age: p.age + 1, rating: newRating };
  });
}

// Check for retirements at season end — older players may call it a day
function checkRetirements(players) {
  return players.filter(p => {
    if (p.age < 33) return true;
    // Chance increases with age: 33=5%, 34=10%, 35=20%, 36=35%, 37+=55%
    const retireChance = Math.min(0.55, (p.age - 32) * 0.10 + 0.05);
    if (Math.random() < retireChance) return false; // retired
    return true;
  });
}

// Morale tick: wins raise it, losses drop it, staff fitness coach helps
function tickMorale(morale, won, drew, hasfit) {
  let delta = won ? 4 : drew ? 0 : -5;
  if (hasfit) delta = delta >= 0 ? delta + 1 : delta + 2;
  return Math.min(100, Math.max(10, morale + delta));
}

function generateScoutFinds(scouts, division) {
  if (!scouts.length) return [];
  const finds = [];
  scouts.forEach(scout => {
    // Each scout brings back 1–2 unique prospects per season
    const count = 1 + Math.floor(Math.random() * 2);
    for (let i = 0; i < count; i++) {
      finds.push({ ...genProspect(scout.spec, division || 0), scoutedBy: scout.name });
    }
  });
  return finds;
}

function generateLeagueTable(divIndex) {
  const teamSets = [
    ["Ashton Vale","Riverside FC","North End","The Wanderers","City Boys"],
    ["Thornton Athletic","East Side FC","Valley United","Harbour Town","Riverside Athletic"],
    ["Coalfield FC","Forest Green","Westgate United","Northern Rangers","Portside FC"],
    ["Dunmore City","Redstone FC","Ironville Town","Blackwater AFC","Crestfield"],
    ["Hallmark United","Brockton City","Southshore FC","Marshfield Town","Westport Athletic"],
    ["Rookfield FC","Greenbrook City","Hartwell Town","Bluebell United","Oldbridge AFC"],
    ["Northgate City","Silverstone FC","Millwall Park","Eastbridge Town","Cranford United"],
    ["Lakeside City","Goldstone FC","Metropolitan","Queensbridge","Northshore United"],
    ["Redwood City","Capital FC","Harbour United","Diamond Park","Crownfield City"],
  ];
  return (teamSets[divIndex] || teamSets[0]).map(name => ({
    name, played: 0, won: 0, drawn: 0, lost: 0, gd: 0, pts: 0,
  }));
}

// Build a 38-match fixture list with alternating home/away
function generateFixtures(leagueTable, clubName) {
  const opponents = leagueTable.map(t => t.name);
  const fixtures = [];
  // Each opponent home + away, then pad/trim to 38
  for (let i = 0; i < opponents.length; i++) {
    fixtures.push({ opponent: opponents[i], home: true });
    fixtures.push({ opponent: opponents[i], home: false });
  }
  // Shuffle
  for (let i = fixtures.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [fixtures[i], fixtures[j]] = [fixtures[j], fixtures[i]];
  }
  // Pad to 38 if needed
  while (fixtures.length < 38) {
    const opp = opponents[Math.floor(Math.random() * opponents.length)];
    fixtures.push({ opponent: opp, home: Math.random() > 0.5 });
  }
  return fixtures.slice(0, 38);
}

                  <td style={{ padding: "5px 6px", textAlign: "center", fontWeight: "bold", color: "#c9a84c" }}>{t.pts}</td>
                </tr>
              ))}
            </tbody>

        </div>
      </div>

      {/* Recent Results */}
      {game.results.length > 0 && (
        <div style={S.card}>
          <div style={S.cardGlow} />
          <div style={S.cardTitle}>Recent Results</div>
          {game.results.slice(-5).reverse().map((r, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", borderBottom: "1px solid #0f0f18", fontSize: 12 }}>
              <span style={{ color: "#888" }}>vs {r.opponent}</span>

            </div>

      )}

      {/* Log */}
      <div style={S.card}>
        <div style={S.cardGlow} />
        <div style={S.cardTitle}>Club Log</div>
        {game.logs.slice(-6).reverse().map((l, i) => (
          <div key={i} style={S.logEntry}>{l}</div>
        ))}
      </div>
    </div>
  );
}

// ─── MATCH SCREEN ─────────────────────────────────────────────────────────────

function MatchScreen({ game, dispatch }) {
  const [phase, setPhase] = useState("prematch");
  const [formation, setFormation] = useState(game.formation);
  const [tactic, setTactic] = useState("balanced");
  const [htTalk, setHtTalk] = useState(null);
  const [htResult, setHtResult] = useState(null);
  const [finalResult, setFinalResult] = useState(null);
  const [momentum, setMomentum] = useState(50);
  const [feed, setFeed] = useState([]);
  const [htFeed, setHtFeed] = useState([]);

  const fixture = game.fixtures[game.matchesPlayed];
  const sqRating = effectiveRating(game.players, game.injuries || [], game.squadRatingMod || 0, game.morale || 65, game.staff || []);
  // Home advantage: +3 when home, -2 when away
  const homeBonus = fixture?.home ? 3 : -2;
  const oppBaseRating = Math.max(35, sqRating + (Math.random() * 20 - 10));
  const [oppRating] = useState(Math.round(oppBaseRating));
  const activeInjuries = (game.injuries || []).filter(i => i.weeksLeft > 0);

  const tacticMod = { balanced: 0, attacking: 4, defensive: -3, counter: 2, pressing: 3 };

  function kickOff() {
    const myStr = Math.max(1, sqRating + homeBonus + (tacticMod[tactic] || 0));
    const oppStr = Math.max(1, oppRating);
    const ht = simHalf(myStr, oppStr);
    setHtResult(ht);
    setHtFeed(buildCommentary(ht.myGoals, ht.oppGoals, game.players, game.clubName, fixture.opponent, 1, 45));
    setMomentum(ht.myGoals > ht.oppGoals ? 65 : ht.myGoals < ht.oppGoals ? 35 : 50);
    setPhase("halftime");
  }

  function finalWhistle() {
    const htBoost = { fire: 6, calm: 3, tactical: 4, press: 8 };
    const boost = htTalk ? (htBoost[htTalk] || 0) : 0;
    const myStr = Math.max(1, sqRating + homeBonus + (tacticMod[tactic] || 0) + boost);
    const oppStr = Math.max(1, oppRating);
    const second = simHalf(myStr, oppStr);
    const final = { myGoals: htResult.myGoals + second.myGoals, oppGoals: htResult.oppGoals + second.oppGoals };
    setFeed(buildCommentary(second.myGoals, second.oppGoals, game.players, game.clubName, fixture.opponent, 46, 90));
    setFinalResult(final);
    setPhase("result");

    const won = final.myGoals > final.oppGoals;
    const drew = final.myGoals === final.oppGoals;
    const pts = won ? 3 : drew ? 1 : 0;
    const gd = final.myGoals - final.oppGoals;

    dispatch({
      type: "MATCH_RESULT",
      won, drew, pts, gd,
      opponent: fixture.opponent,
      home: fixture.home,
      score: `${final.myGoals}-${final.oppGoals}`,
      formation,
    });
  }

  if (!fixture) return (
    <div style={S.card}>
      <div style={{ color: "#888", fontSize: 13 }}>No more fixtures this season.</div>
    </div>
  );

  if (phase === "prematch") return (
    <div>
      <div style={S.card}>
        <div style={S.cardGlow} />
        <div style={{ fontSize: 10, color: "#555", letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 6 }}>
          Match {game.matchesPlayed + 1} of 38 · {fixture.home ? "🏠 Home" : "✈️ Away"}
        </div>
        <div style={{ fontSize: 28, fontWeight: "bold", color: "#e8e0d0", marginBottom: 4 }}>
          {fixture.home ? `${game.clubName} vs ${fixture.opponent}` : `${fixture.opponent} vs ${game.clubName}`}
        </div>
        <div style={{ fontSize: 12, color: "#555" }}>
          {fixture.home ? "Home advantage: +3 boost" : "Away: -2 penalty"} · Opponent strength: ~{oppRating}
        </div>
        {activeInjuries.length > 0 && (
          <div style={{ marginTop: 8, padding: "8px 10px", background: "#1a0a0a", borderRadius: 4, border: "1px solid #5a1010" }}>
            <div style={{ fontSize: 10, color: "#8b2020", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 4 }}>🚑 Injured</div>
            {activeInjuries.map(i => (
              <div key={i.playerId} style={{ fontSize: 11, color: "#c07070" }}>{i.playerName} — {i.weeksLeft} week{i.weeksLeft > 1 ? "s" : ""} remaining</div>
            ))}
          </div>
        )}
      </div>

      <div style={S.card}>
        <div style={S.cardGlow} />
        <div style={S.cardTitle}>Formation</div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 16 }}>
          {["4-4-2","4-3-3","4-2-3-1","3-5-2","5-3-2"].map(f => (
            <button key={f} style={{ ...S.btn(formation === f ? "primary" : "ghost"), flex: "1 1 80px", padding: "8px 4px", fontSize: 11 }} onClick={() => setFormation(f)}>{f}</button>
          ))}
        </div>
        <div style={S.cardTitle}>Game Plan</div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {[["balanced","⚖️ Balanced"],["attacking","⚔️ Attack"],["defensive","🛡️ Defend"],["counter","🏃 Counter"],["pressing","🔥 Press"]].map(([v, l]) => (
            <button key={v} style={{ ...S.btn(tactic === v ? "primary" : "ghost"), flex: "1 1 90px", padding: "8px 4px", fontSize: 10 }} onClick={() => setTactic(v)}>{l}</button>
          ))}
        </div>
      </div>

      <button style={S.btn("primary")} onClick={kickOff}>⚽ Kick Off</button>
    </div>
  );

  if (phase === "halftime") return (
    <div>
      <div style={S.card}>
        <div style={S.cardGlow} />
        <div style={S.cardTitle}>Half Time</div>
        <div style={{ textAlign: "center", padding: "16px 0" }}>
          <div style={{ fontSize: 46, fontWeight: "bold", letterSpacing: "0.1em" }}>
            <span style={{ color: "#c9a84c" }}>{htResult.myGoals}</span>
            <span style={{ color: "#333", margin: "0 10px" }}>—</span>
            <span style={{ color: "#8b4040" }}>{htResult.oppGoals}</span>
          </div>
          <div style={{ fontSize: 11, color: "#555", marginTop: 6 }}>{game.clubName} vs {fixture.opponent}</div>
        </div>
        <div style={{ marginTop: 8 }}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "#444", marginBottom: 4 }}>
            <span>You</span><span>Momentum</span><span>Them</span>
          </div>
          <div style={{ height: 6, background: "#1a1a2e", borderRadius: 3, overflow: "hidden" }}>
            <div style={{ height: "100%", borderRadius: 3, background: "linear-gradient(90deg,#c9a84c,#a07830)", width: `${momentum}%`, transition: "width 0.5s" }} />
          </div>
        </div>
      </div>

      {htFeed.length > 0 && (
        <div style={S.card}>
          <div style={S.cardGlow} />
          <div style={S.cardTitle}>First Half</div>
          {htFeed.map((l, i) => (
            <div key={i} style={{ display: "flex", gap: 8, fontSize: 12, padding: "4px 0", color: l.mine ? "#c9a84c" : l.neutral ? "#666" : "#8b6060" }}>
              <span style={{ color: "#444", minWidth: 28 }}>{l.min}'</span>
              <span>{l.text}</span>
            </div>
          ))}
        </div>
      )}

      <div style={S.card}>
        <div style={S.cardGlow} />
        <div style={S.cardTitle}>Halftime Talk</div>
        {[
          ["fire","🔥 Fire them up (+6 attack)"],
          ["calm","🧘 Stay calm (+3 all-round)"],
          ["tactical","♟️ Tactical tweak (+4 structure)"],
          ["press","⚡ Push for it (+8 attack)"],
        ].map(([k, l]) => (
          <button key={k} style={{ ...S.btn(htTalk === k ? "primary" : "ghost"), marginBottom: 8 }} onClick={() => setHtTalk(k)}>{l}</button>
        ))}
      </div>

      <button style={S.btn("success")} onClick={finalWhistle}>🎯 Second Half →</button>
    </div>
  );

  if (phase === "result" && finalResult) return (
    <div>
      <div style={S.card}>
        <div style={S.cardGlow} />
        <div style={{ textAlign: "center", padding: "20px 0" }}>
          <div style={{ fontSize: 10, color: "#555", letterSpacing: "0.2em", textTransform: "uppercase", marginBottom: 6 }}>Full Time</div>
          <div style={{ fontSize: 52, fontWeight: "bold", letterSpacing: "0.1em" }}>
            <span style={{ color: "#c9a84c" }}>{finalResult.myGoals}</span>
            <span style={{ color: "#2a2a2a", margin: "0 12px" }}>—</span>
            <span style={{ color: "#8b4040" }}>{finalResult.oppGoals}</span>
          </div>
          <div style={{ fontSize: 13, color: "#666", marginTop: 6 }}>{game.clubName} vs {fixture.opponent}</div>
          <div style={{ marginTop: 14, fontSize: 20, fontWeight: "bold", color: finalResult.myGoals > finalResult.oppGoals ? "#4a9a6a" : finalResult.myGoals === finalResult.oppGoals ? "#c9a84c" : "#8b2020" }}>
            {finalResult.myGoals > finalResult.oppGoals ? "VICTORY 🏆" : finalResult.myGoals === finalResult.oppGoals ? "DRAW" : "DEFEAT"}
          </div>
        </div>
      </div>
      {feed.length > 0 && (
        <div style={S.card}>
          <div style={S.cardGlow} />
          <div style={S.cardTitle}>Second Half</div>
          {feed.map((l, i) => (
            <div key={i} style={{ display: "flex", gap: 8, fontSize: 12, padding: "4px 0", color: l.mine ? "#c9a84c" : l.neutral ? "#666" : "#8b6060" }}>
              <span style={{ color: "#444", minWidth: 28 }}>{l.min}'</span>
              <span>{l.text}</span>
            </div>
          ))}
        </div>
      )}
      <button style={S.btn("primary")} onClick={() => dispatch({ type: "SET_SCREEN", screen: "dashboard" })}>
        Return to Club →
      </button>
    </div>
  );

  return null;
}

function SquadScreen({ game, dispatch }) {
  const [sort, setSort] = useState("rating");
  const sorted = [...game.players].sort((a, b) => b[sort] - a[sort]);
  return (
    <div>
      <div style={S.card}>
        <div style={S.cardGlow} />
        <div style={S.cardTitle}>Squad · {game.players.length} Players · Avg {squadRating(game.players)}</div>
        <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
          {["rating","age","wage"].map(s => (

          ))}
        </div>
        {sorted.map(p => {
          const injury = (game.injuries || []).find(i => i.playerId === p.id);
          const val = marketValue(p);
          const pot = p.potential || p.rating;

            <div key={p.id} style={{ ...S.playerRow(false), opacity: injury ? 0.6 : 1 }}>

                <div style={{ fontSize: 10, color: "#555" }}>{p.pos} · Age {p.age} · {fmt(p.wage)}/wk {injury ? `· Out ${injury.weeksLeft}wk` : ""}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 11, color: "#4a9a6a", fontWeight: "bold" }}>{fmt(val)}</div>
                <button style={{ ...S.btn("ghost"), width: "auto", padding: "2px 8px", fontSize: 9, marginTop: 2 }} onClick={() => { if (window.confirm(`Sell ${p.name} for ${fmt(val)}?`)) dispatch({ type: "SELL_PLAYER", playerId: p.id }); }}>Sell</button>

        <div style={S.cardGlow} />
        <div style={S.cardTitle}>Head Coach</div>
        <div style={S.playerRow(false)}>

          <div style={{ flex: 1, marginLeft: 10 }}>
            <div style={{ fontSize: 13, color: "#c9a84c" }}>{game.coach.name}</div>
            <div style={{ fontSize: 10, color: "#555" }}>{game.coach.style} · {fmt(game.coach.wage)}/wk</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── TRANSFER SCREEN ──────────────────────────────────────────────────────────

function TransferScreen({ game, dispatch }) {
  const [filter, setFilter] = useState("ALL");
  const [search, setSearch] = useState("");
  const [showAll, setShowAll] = useState(false);
  const positions = ["ALL","GK","CB","LB","RB","CM","LW","RW","ST"];
  const wageTotal = game.players.reduce((a, p) => a + p.wage, 0) + game.coach.wage;
  const wageCeiling = game.wageBudget || TIER_WAGE_BUDGET[game.division] || 1500;
  const wageHeadroom = wageCeiling - wageTotal;

  const available = MARKET_PLAYERS.filter(p => {
    const posMatch = filter === "ALL" || p.pos === filter;
    const searchMatch = !search || p.name.toLowerCase().includes(search.toLowerCase());
    const notOwned = !game.players.find(pl => pl.name === p.name);
    const divMatch = showAll ? true : p.minDiv <= game.division + 1;
    return posMatch && searchMatch && notOwned && divMatch;
  }).sort((a, b) => a.price - b.price);

  return (
    <div>
      <div style={S.card}>
        <div style={S.cardGlow} />
        <div style={S.cardTitle}>Transfer Market</div>
        <div style={{ display: "flex", gap: 10, marginBottom: 12 }}>
          <div style={{ flex: 1, padding: "8px 10px", background: "#080810", borderRadius: 4, border: "1px solid #1a1a2e" }}>
            <div style={{ fontSize: 14, fontWeight: "bold", color: game.transferBudget >= 0 ? "#c9a84c" : "#8b2020" }}>{fmt(game.transferBudget)}</div>
            <div style={{ fontSize: 9, color: "#444", textTransform: "uppercase" }}>Transfer budget</div>
          </div>
          <div style={{ flex: 1, padding: "8px 10px", background: "#080810", borderRadius: 4, border: "1px solid #1a1a2e" }}>
            <div style={{ fontSize: 14, fontWeight: "bold", color: wageHeadroom > 0 ? "#4a9a6a" : "#8b2020" }}>{fmt(wageHeadroom)}/wk</div>
            <div style={{ fontSize: 9, color: "#444", textTransform: "uppercase" }}>Wage room left</div>
          </div>
        </div>
        <input style={{ ...S.input, marginBottom: 8 }} placeholder="Search players..." value={search} onChange={e => setSearch(e.target.value)} />
        <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginBottom: 8 }}>
          {positions.map(p => (
            <button key={p} style={{ ...S.btn(filter === p ? "primary" : "ghost"), flex: "1 1 36px", padding: "6px 2px", fontSize: 9 }} onClick={() => setFilter(p)}>{p}</button>
          ))}
        </div>
        <button style={{ ...S.btn("ghost"), fontSize: 10 }} onClick={() => setShowAll(!showAll)}>
          {showAll ? "Show division-appropriate only" : "Show all players"}
        </button>
      </div>

      {available.length === 0 && (
        <div style={{ ...S.card, textAlign: "center", color: "#555", fontSize: 13 }}>No players found. Try a different filter.</div>
      )}

      {available.map(p => {
        const canAfford = game.transferBudget >= p.price;
        const warnWage = p.wage > wageHeadroom;
        return (
          <div key={p.name} style={{ ...S.card, marginBottom: 8 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={S.ratingBadge(p.rating)}>{p.rating}</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: "bold", color: "#e8e0d0" }}>{p.name}</div>
                <div style={{ fontSize: 10, color: "#555" }}>{p.pos} · Age {p.age}</div>
                <div style={{ fontSize: 10, color: warnWage ? "#8b6020" : "#4a7a5a" }}>{fmt(p.wage)}/wk {warnWage ? "⚠️" : "✓"}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 13, fontWeight: "bold", color: canAfford ? "#c9a84c" : "#444" }}>{fmt(p.price)}</div>
                <button style={{ ...S.btn(canAfford ? "success" : "ghost"), padding: "4px 10px", fontSize: 9, marginTop: 4, width: "auto" }} onClick={() => canAfford && dispatch({ type: "BUY_PLAYER", player: p })} disabled={!canAfford}>
                  {canAfford ? "Sign" : "Can't"}
                </button>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function StaffScreen({ game, dispatch }) {
  const staff = game.staff || [];
  const scouts = game.scouts || [];

              </div>

                <div style={{ fontSize: 11, color: "#777" }}>{fmt(role.wage)}/wk</div>
                {hired ? (
                  <button style={{ ...S.btn("danger"), width: "auto", padding: "3px 10px", fontSize: 9, marginTop: 3 }} onClick={() => dispatch({ type: "FIRE_STAFF", staffId: role.id })}>Fire</button>
                ) : (
                  <button style={{ ...S.btn(game.transferBudget > 0 ? "success" : "ghost"), width: "auto", padding: "3px 10px", fontSize: 9, marginTop: 3 }} onClick={() => dispatch({ type: "HIRE_STAFF", staff: role })}>Hire</button>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {/* Scouts */}
      <div style={S.card}>
        <div style={S.cardGlow} />
        <div style={S.cardTitle}>Scouts</div>
        {AVAILABLE_SCOUTS.filter(s => s.divUnlock <= game.division).map(scout => {
          const hired = scouts.find(s => s.id === scout.id);
          return (
            <div key={scout.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: "1px solid #0f0f18" }}>
              <div style={{ fontSize: 22, width: 32, textAlign: "center" }}>{scout.icon}</div>
              <div style={{ flex: 1 }}>

                <div style={{ fontSize: 10, color: "#555" }}>{scout.desc}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 11, color: "#777" }}>{fmt(scout.wage)}/wk</div>
                {hired ? (
                  <button style={{ ...S.btn("danger"), width: "auto", padding: "3px 10px", fontSize: 9, marginTop: 3 }} onClick={() => dispatch({ type: "FIRE_SCOUT", scoutId: scout.id })}>Fire</button>

                  <button style={{ ...S.btn("success"), width: "auto", padding: "3px 10px", fontSize: 9, marginTop: 3 }} onClick={() => dispatch({ type: "HIRE_SCOUT", scout })}>Hire</button>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {/* Scout Finds */}
      {scoutFinds.length > 0 && (
        <div style={S.card}>
          <div style={S.cardGlow} />
          <div style={S.cardTitle}>🔍 Scout Reports — New Season</div>
          <div style={{ fontSize: 11, color: "#555", marginBottom: 10 }}>Your scouts have identified these players. Sign them before next season or they move on.</div>
          {scoutFinds.map(p => {

  );
}

// ─── REDUCER ─────────────────────────────────────────────────────────────────

function applyNewsEffect(state, effect) {
  let s = { ...state };
  if (effect.money) s.transferBudget = Math.max(0, (s.transferBudget || 0) + effect.money);
  if (effect.boardConfidence) s.boardConfidence = Math.min(100, Math.max(0, s.boardConfidence + effect.boardConfidence));
  if (effect.fanBase) s.fanBase = Math.max(50, s.fanBase + effect.fanBase);
  if (effect.stadiumCapacity) s.stadiumCapacity = s.stadiumCapacity + effect.stadiumCapacity;
  if (effect.squadRatingMod) s.squadRatingMod = (s.squadRatingMod || 0) + effect.squadRatingMod;
  if (effect.newPlayer) s.players = [...s.players, { ...effect.newPlayer, id: Date.now() }];
  if (effect.morale) s.morale = Math.min(100, Math.max(10, (s.morale || 65) + effect.morale));
  // Individual player development boosts from news
  if (effect.devBoost) {
    s.players = s.players.map(p => {
      const match = !effect.devBoost.pos || effect.devBoost.pos === p.pos;
      if (!match) return p;
      return { ...p, rating: Math.min(99, p.rating + effect.devBoost.amount) };
    });
  }
  return s;
}

function pickNewsEvent(matchesPlayed) {
  // Fire every 3-4 matches for more drama
  if (matchesPlayed > 0 && matchesPlayed % (3 + Math.floor(Math.random() * 2)) === 0) {
    // Alternate between club news and world news
    const pool = matchesPlayed % 6 < 3 ? NEWS_EVENTS_OWN : NEWS_EVENTS_WORLD;
    return pool[Math.floor(Math.random() * pool.length)];
  }
  return null;
}

function reducer(state, action) {
  switch (action.type) {
    case "SET_SCREEN":
      return { ...state, screen: action.screen };

    case "MATCH_RESULT": {
      const isHome = action.home;
      const fillRate = isHome ? 0.5 + Math.random() * 0.35 : 0;
      const attendance = isHome ? Math.round(state.stadiumCapacity * fillRate) : 0;
      // Ticket price scales with division — Sunday League £8, Premier League £26
      const ticketPrice = 8 + state.division * 2;
      const matchday_income = isHome ? attendance * ticketPrice : 0;
      // Away travel costs a small amount
      const travelCost = isHome ? 0 : 150 + state.division * 50;
      // FM model: matches don't drain a bank balance. Surplus revenue tops up the
      // transfer budget; overspending the wage ceiling is penalised instead.
      const wageTotal = state.players.reduce((a, p) => a + p.wage, 0) + state.coach.wage;
      const sponsorIncome = Math.round(800 + state.division * 600 + state.fanBase * 0.15);
      const wageBudget = state.wageBudget || TIER_WAGE_BUDGET[state.division] || 1500;
      const overWage = Math.max(0, wageTotal - wageBudget);
      // Matchday + sponsor income converts to a small transfer-budget top-up per match
      const surplus = Math.round((matchday_income + sponsorIncome - travelCost) * 0.5);
      // If over the wage ceiling, the board claws money back from your budget and loses faith
      const wagePenalty = overWage > 0 ? Math.round(overWage * 4) : 0;
      const newTransferBudget = Math.max(0, (state.transferBudget || 0) + surplus - wagePenalty);
      const wageMsg = overWage > 0
        ? `⚠️ Wage bill ${fmt(wageTotal)}/wk over the ${fmt(wageBudget)} ceiling — board docked ${fmt(wagePenalty)}.`
        : null;

      const hasFit = (state.staff || []).some(s => s.effect === "fitness");
      const physioPresent = (state.staff || []).some(s => s.effect === "physio");
      const newMorale = tickMorale(state.morale || 65, action.won, action.drew, hasFit);
      const newFans = state.fanBase + (action.won ? 15 + state.division * 5 : action.drew ? 2 : -8);
      // Tick existing injuries down, potentially add a new one
      // Physio reduces each injury by an extra week
      const physio = (state.staff || []).some(s => s.effect === "physio");
      const rawTicked = tickInjuries(state.injuries || []);
      const tickedInjuries = physio
        ? rawTicked.map(i => ({ ...i, weeksLeft: Math.max(0, i.weeksLeft - 1) })).filter(i => i.weeksLeft > 0)
        : rawTicked;
      const newInjuries = maybeInjury(state.players, tickedInjuries);
      const injuryMsg = newInjuries.length > tickedInjuries.length
        ? `🚑 ${newInjuries[newInjuries.length-1].playerName} injured — ${newInjuries[newInjuries.length-1].weeksLeft} weeks out`
        : null;
      const newBoard = Math.min(100, Math.max(0, state.boardConfidence + (action.won ? 3 : action.drew ? 0 : -5) - (overWage > 0 ? 4 : 0)));
      const newMatchesPlayed = state.matchesPlayed + 1;
      const newWeek = state.week + 1;

      const newTable = state.leagueTable.map(t => {
        if (t.name === action.opponent) {
          const oppPts = action.won ? 0 : action.drew ? 1 : 3;
          return { ...t, played: t.played + 1, won: t.won + (action.won ? 0 : action.drew ? 0 : 1), drawn: t.drawn + (action.drew ? 1 : 0), lost: t.lost + (action.won ? 1 : 0), gd: t.gd + (action.drew ? 0 : action.won ? -Math.abs(action.gd) : Math.abs(action.gd)), pts: t.pts + oppPts };
        }
        const r = Math.random();
        const wt = r > 0.58 ? 1 : 0; const dt = r > 0.38 && r <= 0.58 ? 1 : 0;
        return { ...t, played: t.played + 1, won: t.won + wt, drawn: t.drawn + dt, lost: t.lost + (wt === 0 && dt === 0 ? 1 : 0), gd: t.gd + (wt ? 1 : dt ? 0 : -1), pts: t.pts + (wt ? 3 : dt ? 1 : 0) };
      });

      const loc = isHome ? "H" : "A";
      const resultStr = `[${loc}] ${action.score} vs ${action.opponent} — ${action.won ? "W ✓" : action.drew ? "D" : "L ✗"}`;
      const trimmed = state.logs.slice(-25);
      let newLogs = [...trimmed, resultStr];
      if (injuryMsg) newLogs.push(injuryMsg);
      if (wageMsg) newLogs.push(wageMsg);

      // Check for news event
      const newsEvent = pickNewsEvent(newMatchesPlayed);

      // Season end at 38 matches
      if (newMatchesPlayed >= 38) {
        const myPts = state.points + action.pts;
        const myGd = state.goalDiff + action.gd;
        // Build final standings including the player to get a real finishing position
        const standings = [
          { name: state.clubName, pts: myPts, gd: myGd, isPlayer: true },
          ...newTable.map(t => ({ name: t.name, pts: t.pts, gd: t.gd })),
        ].sort((a, b) => b.pts - a.pts || b.gd - a.gd);
        const finishPos = standings.findIndex(t => t.isPlayer) + 1;
        const lastPos = standings.length;
        const promoted = finishPos <= 2 && state.division < DIVISIONS.length - 1;
        const champions = finishPos === 1;
        const relegated = finishPos >= lastPos - 1 && state.division > 0;
        const newDiv = promoted ? state.division + 1 : relegated ? state.division - 1 : state.division;
        const prizeMoney = 4000 + state.division * 2500 + (champions ? 5000 : 0);
        const endMsg = champions && promoted ? `🏆 CHAMPIONS! Promoted to ${DIVISIONS[newDiv]}!`
                     : promoted ? `🎉 PROMOTED to ${DIVISIONS[newDiv]} (finished ${ord(finishPos)})!`
                     : relegated ? `😢 Relegated to ${DIVISIONS[newDiv]} (finished ${ord(finishPos)}).`
                     : `🏁 Season ${state.season} ended ${ord(finishPos)}. Prize: ${fmt(prizeMoney)}`;
        const newLeague = generateLeagueTable(newDiv);
        // End of season: develop players, age them, check retirements
        const developed = developPlayers(state.players, state.staff || [], state.morale || 65, state.academyLevel);
        const afterRetire = checkRetirements(developed);
        const retirees = developed.filter(p => !afterRetire.find(r => r.id === p.id));
        const retireLog = retirees.length > 0
          ? `👋 ${retirees.map(r => r.name).join(", ")} retired at end of season.`
          : null;
        // Scout finds reset each season
        const newScoutFinds = generateScoutFinds(state.scouts || [], newDiv);
        // FM-style budget on tier change: promotion injects the new tier's transfer
        // budget on top of what you've saved; relegation trims you to the lower ceiling.
        const baseBudget = newTransferBudget + prizeMoney;
        const tierBudget = promoted
          ? baseBudget + TIER_TRANSFER_BUDGET[newDiv]
          : relegated
            ? Math.min(baseBudget, TIER_TRANSFER_BUDGET[newDiv] * 1.5)
            : baseBudget;
        const newWageBudget = TIER_WAGE_BUDGET[newDiv] || state.wageBudget;
        const budgetMsg = promoted
          ? `💷 Promotion budget: +${fmt(TIER_TRANSFER_BUDGET[newDiv])} transfer funds. Wage ceiling now ${fmt(newWageBudget)}/wk.`
          : relegated
            ? `📉 Budget cut to ${DIVISIONS[newDiv]} level. Wage ceiling now ${fmt(newWageBudget)}/wk.`
            : null;
        return {
          ...state,
          transferBudget: Math.round(tierBudget),
          wageBudget: newWageBudget,
          fanBase: Math.max(100, newFans),
          boardConfidence: newBoard,
          division: newDiv,
          season: state.season + 1,
          week: 1,
          matchesPlayed: 0,
          wins: 0, draws: 0, losses: 0, points: 0, goalDiff: 0,
          results: [],
          formation: action.formation,
          leagueTable: newLeague,
          fixtures: generateFixtures(newLeague, state.clubName),
          pendingNews: null,
          injuries: [],
          boardCredit: 0,
          morale: Math.min(100, (state.morale || 65) + 5),
          players: afterRetire,
          scoutFinds: newScoutFinds,
          logs: [...newLogs, endMsg, ...(budgetMsg ? [budgetMsg] : []), ...(retireLog ? [retireLog] : [])],
          screen: "dashboard",
        };
      }

      return {
        ...state,
        transferBudget: newTransferBudget,
        fanBase: Math.max(100, newFans),
        boardConfidence: newBoard,
        injuries: newInjuries,
        morale: newMorale,
        wins: state.wins + (action.won ? 1 : 0),
        draws: state.draws + (action.drew ? 1 : 0),
        losses: state.losses + (!action.won && !action.drew ? 1 : 0),
        points: state.points + action.pts,
        goalDiff: state.goalDiff + action.gd,
        matchesPlayed: newMatchesPlayed,
        week: newWeek,
        results: [...state.results, { opponent: action.opponent, score: action.score, won: action.won, drew: action.drew, home: action.home }],
        leagueTable: newTable,
        formation: action.formation,
        pendingNews: newsEvent || null,
        logs: newLogs,
        screen: newsEvent ? "dashboard" : "dashboard",
      };
    }

    case "RESOLVE_NEWS": {
      const s = applyNewsEffect(state, action.effect);
      // Board credit: positive outcomes build credit, negative drain it
      const creditDelta = (action.effect.boardConfidence || 0) > 0 ? 1
                        : (action.effect.boardConfidence || 0) < 0 ? -1
                        : (action.effect.money || 0) > 0 ? 1
                        : (action.effect.fanBase || 0) > 20 ? 1
                        : 0;
      const newCredit = Math.max(-5, Math.min(10, (s.boardCredit || 0) + creditDelta));
      // Every 5 credit points = board grants a £5,000 transfer bonus
      let bonusMoney = 0;
      let bonusLog = null;
      if (newCredit >= 5) {
        bonusMoney = 5000;
        bonusLog = "🏦 Board impressed — granted £5,000 transfer bonus!";
      } else if (newCredit <= -3) {
        bonusLog = "⚠️ Board losing patience with your decisions.";
      }
      return {
        ...s,
        pendingNews: null,
        boardCredit: bonusMoney > 0 ? 0 : newCredit,
        transferBudget: (s.transferBudget || 0) + bonusMoney,
        boardConfidence: bonusMoney > 0 ? Math.min(100, s.boardConfidence + 3) : s.boardConfidence,
        logs: [...s.logs.slice(-25), `📰 ${action.label}`, ...(bonusLog ? [bonusLog] : [])],
      };
    }

    case "BUY_PLAYER": {
      const p = action.player;
      if ((state.transferBudget || 0) < p.price) return state;
      return { ...state, transferBudget: state.transferBudget - p.price, players: [...state.players, { ...p, id: Date.now() }], logs: [...state.logs.slice(-25), `💰 Signed ${p.name} for ${fmt(p.price)}`] };
    }

    case "SELL_PLAYER": {
      const p = state.players.find(pl => pl.id === action.playerId);
      if (!p) return state;
      if (state.players.length <= 11) return { ...state, logs: [...state.logs.slice(-25), `⚠️ Can't sell — squad too thin (min 11).`] };
      const fee = marketValue(p);
      return {
        ...state,
        transferBudget: (state.transferBudget || 0) + fee,
        players: state.players.filter(pl => pl.id !== action.playerId),
        injuries: (state.injuries || []).filter(i => i.playerId !== action.playerId),
        logs: [...state.logs.slice(-25), `🤝 Sold ${p.name} (${p.rating}) for ${fmt(fee)}`],
      };
    }

    case "SACK_COACH":
      return { ...state, boardConfidence: Math.max(0, state.boardConfidence - 8), coach: { name: "Vacant", style: "-", rating: 0, wage: 0 }, logs: [...state.logs.slice(-25), `🔥 ${state.coach.name} sacked.`] };

    case "HIRE_COACH":
      return { ...state, coach: action.coach, logs: [...state.logs.slice(-25), `📋 ${action.coach.name} appointed.`] };

    case "UPGRADE_STADIUM":
      if ((state.transferBudget || 0) < 25000) return state;
      return { ...state, transferBudget: state.transferBudget - 25000, stadiumCapacity: state.stadiumCapacity + 500, logs: [...state.logs.slice(-25), `🏟️ Stadium expanded to ${state.stadiumCapacity + 500}.`] };

    case "UPGRADE_TRAINING":
      if ((state.transferBudget || 0) < 15000) return state;
      return { ...state, transferBudget: state.transferBudget - 15000, trainingLevel: state.trainingLevel + 1, players: state.players.map(p => ({ ...p, rating: Math.min(99, p.rating + 1) })), logs: [...state.logs.slice(-25), `⬆️ Training ground Level ${state.trainingLevel + 1}.`] };

    case "UPGRADE_ACADEMY":
      if ((state.transferBudget || 0) < 20000) return state;
      return { ...state, transferBudget: state.transferBudget - 20000, academyLevel: state.academyLevel + 1, logs: [...state.logs.slice(-25), `🌱 Academy Level ${state.academyLevel + 1}.`] };

    case "HIRE_STAFF": {
      const alreadyHired = (state.staff || []).find(s => s.id === action.staff.id);
      if (alreadyHired) return state;
      return { ...state, staff: [...(state.staff || []), action.staff], logs: [...state.logs.slice(-25), `✅ ${action.staff.name} joined the backroom team.`] };
    }
    case "FIRE_STAFF":
      return { ...state, staff: (state.staff || []).filter(s => s.id !== action.staffId), logs: [...state.logs.slice(-25), `🔥 Staff member dismissed.`] };

    case "HIRE_SCOUT": {
      const already = (state.scouts || []).find(s => s.id === action.scout.id);
      if (already) return state;
      return { ...state, scouts: [...(state.scouts || []), action.scout], logs: [...state.logs.slice(-25), `🔍 ${action.scout.name} hired as scout.`] };
    }
    case "FIRE_SCOUT":
      return { ...state, scouts: (state.scouts || []).filter(s => s.id !== action.scoutId), logs: [...state.logs.slice(-25), `🔥 Scout dismissed.`] };

    case "SIGN_SCOUT_FIND": {
      const p = action.player;
      if ((state.transferBudget || 0) < p.price) return state;
      return {
        ...state,
        transferBudget: state.transferBudget - p.price,
        players: [...state.players, { ...p, id: uid() }],
        scoutFinds: (state.scoutFinds || []).filter(f => f.id !== p.id),
        logs: [...state.logs.slice(-25), `💰 Signed ${p.name} (scouted) for ${fmt(p.price)}`],
      };
    }

    default:
      return state;
  }
}

        </div>
        <div style={S.card}>
          <div style={S.cardGlow} />
          {step === 0 ? (
            <div>
              <label style={S.label}>Club Name</label>
              <input style={S.input} placeholder="e.g. Ironwood FC" value={clubName} onChange={e => setClubName(e.target.value)} onKeyDown={e => e.key === "Enter" && clubName.trim() && setStep(1)} />
              <div style={{ marginTop: 14 }}>
                <button style={S.btn("primary")} onClick={() => clubName.trim() && setStep(1)}>Continue →</button>
              </div>
            </div>
          ) : (
            <div>
              <label style={S.label}>Stadium Name</label>
              <input style={S.input} placeholder="e.g. The Ironworks Ground" value={stadium} onChange={e => setStadium(e.target.value)} onKeyDown={e => e.key === "Enter" && stadium.trim() && onStart(clubName.trim(), stadium.trim())} />
              <div style={{ marginTop: 14, display: "flex", gap: 8 }}>
                <button style={{ ...S.btn("ghost"), flex: 1 }} onClick={() => setStep(0)}>← Back</button>
                <button style={{ ...S.btn("primary"), flex: 2 }} onClick={() => stadium.trim() && onStart(clubName.trim(), stadium.trim())}>Begin Journey</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────

const STORAGE_KEY = "football-empire-v7";

function App() {
  const [game, setGame] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    async function load() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (saved?.value) setGame(JSON.parse(saved.value));
      } catch (e) {}
      setLoading(false);
    }
    load();
  }, []);

  function save(g) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(g)); } catch (e) {}
  }

  function dispatch(action) {
    setGame(prev => {
      const next = reducer(prev, action);
      save(next);
      return next;
    });
  }

  function startGame(clubName, stadium) {
    const g = createNewGame(clubName, stadium);
    setGame(g); save(g);
  }

  async function resetGame() {
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    setGame(null);
  }

  if (loading) return <div style={{ ...S.app, display: "flex", alignItems: "center", justifyContent: "center" }}><div style={{ color: "#c9a84c", fontSize: 13, letterSpacing: "0.2em" }}>LOADING...</div></div>;
  if (!game) return <SetupScreen onStart={startGame} />;

  const TABS = [
    { id: "dashboard", label: "Dashboard" },
    { id: "match", label: "⚽ Match" },
    { id: "squad", label: "Squad" },
    { id: "transfers", label: "Transfers" },
    { id: "staff", label: "Staff" },
    { id: "boardroom", label: "Boardroom" },
    { id: "club", label: "Club" },
  ];

  return (
    <div style={S.app}>
      <div style={S.scanlines} />

      {/* News overlay — blocks progress until decided */}
      {game.pendingNews && (
        <NewsOverlay
          event={game.pendingNews}
          onDecide={(opt) => dispatch({ type: "RESOLVE_NEWS", effect: opt.effect, label: opt.label })}
        />
      )}

      <div style={S.header}>
        <div>
          <div style={S.clubName}>{game.clubName}</div>
          <div style={S.divBadge}>{DIVISIONS[game.division]} · S{game.season} W{game.week}</div>
        </div>
        <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
          <div style={{ textAlign: "center" }}>
            <div style={S.statVal}>{fmt(game.transferBudget)}</div>
            <div style={S.statLbl}>Budget</div>
          </div>
          <div style={{ textAlign: "center" }}>
            <div style={S.statVal}>{game.points}pts</div>
            <div style={S.statLbl}>Points</div>
          </div>
          <button style={{ background: "none", border: "1px solid #222", color: "#444", borderRadius: 4, padding: "4px 8px", cursor: "pointer", fontSize: 10 }} onClick={resetGame} title="New Game">↺</button>
        </div>
      </div>

      <div style={S.nav}>
        {TABS.map(t => (
          <button key={t.id} style={S.navBtn(game.screen === t.id)} onClick={() => dispatch({ type: "SET_SCREEN", screen: t.id })}>{t.label}</button>
        ))}
      </div>

      <div style={S.main}>
        {game.screen === "dashboard" && <Dashboard game={game} dispatch={dispatch} />}
        {game.screen === "match" && <MatchScreen key={`${game.season}-${game.matchesPlayed}`} game={game} dispatch={dispatch} />}
        {game.screen === "squad" && <SquadScreen game={game} dispatch={dispatch} />}
        {game.screen === "transfers" && <TransferScreen game={game} dispatch={dispatch} />}
        {game.screen === "staff" && <StaffScreen game={game} dispatch={dispatch} />}
        {game.screen === "boardroom" && <BoardroomScreen game={game} dispatch={dispatch} />}
        {game.screen === "club" && <ClubScreen game={game} dispatch={dispatch} />}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
